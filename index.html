<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 에디터 - 기사 수정 도우미</title>
<style>
/* ===== CSS Variables / Theme ===== */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow: 0 2px 12px rgba(0,0,0,0.15);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.25);
}

[data-theme="dark"] {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-tertiary: #242836;
  --bg-hover: #2a2f3e;
  --text-primary: #e8eaf0;
  --text-secondary: #9ca3b4;
  --text-muted: #636b7e;
  --border: #2e3346;
  --border-focus: #5b6abf;
  --accent: #6c7ae0;
  --accent-hover: #8490f0;
  --accent-glow: rgba(108, 122, 224, 0.15);
  --error: #f5555d;
  --error-bg: rgba(245, 85, 93, 0.12);
  --warning: #f0b052;
  --warning-bg: rgba(240, 176, 82, 0.12);
  --info: #4dacf0;
  --info-bg: rgba(77, 172, 240, 0.12);
  --success: #4dd68e;
  --success-bg: rgba(77, 214, 142, 0.12);
  --diff-add-bg: rgba(77, 214, 142, 0.15);
  --diff-add-text: #6ee7a0;
  --diff-del-bg: rgba(245, 85, 93, 0.15);
  --diff-del-text: #ff8a8e;
  --score-ring-bg: #2e3346;
}

[data-theme="light"] {
  --bg-primary: #f5f6fa;
  --bg-secondary: #ffffff;
  --bg-tertiary: #eef0f6;
  --bg-hover: #e4e7f0;
  --text-primary: #1a1d27;
  --text-secondary: #5a6175;
  --text-muted: #8a92a6;
  --border: #d8dce8;
  --border-focus: #5b6abf;
  --accent: #5b6abf;
  --accent-hover: #4a58a8;
  --accent-glow: rgba(91, 106, 191, 0.12);
  --error: #dc3545;
  --error-bg: rgba(220, 53, 69, 0.08);
  --warning: #d4940a;
  --warning-bg: rgba(212, 148, 10, 0.08);
  --info: #2b8ad4;
  --info-bg: rgba(43, 138, 212, 0.08);
  --success: #28a060;
  --success-bg: rgba(40, 160, 96, 0.08);
  --diff-add-bg: rgba(40, 160, 96, 0.12);
  --diff-add-text: #1a7a45;
  --diff-del-bg: rgba(220, 53, 69, 0.12);
  --diff-del-text: #b32030;
  --score-ring-bg: #d8dce8;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

/* ===== Header ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background var(--transition), border-color var(--transition);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 18px;
}

.logo-text {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 16px;
}

/* Score Display */
.score-display {
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transform: scale(0.9);
  transition: opacity var(--transition), transform var(--transition);
}

.score-display.visible {
  opacity: 1;
  transform: scale(1);
}

.score-ring {
  position: relative;
  width: 44px;
  height: 44px;
}

.score-ring svg {
  transform: rotate(-90deg);
  width: 44px;
  height: 44px;
}

.score-ring .ring-bg {
  fill: none;
  stroke: var(--score-ring-bg);
  stroke-width: 4;
}

.score-ring .ring-fg {
  fill: none;
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease, stroke 0.5s ease;
}

.score-value {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}

.score-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}

/* Theme Toggle */
.theme-toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: background var(--transition), border-color var(--transition);
}

.theme-toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  transition: transform var(--transition);
}

[data-theme="light"] .theme-toggle::after {
  transform: translateX(20px);
}

.theme-toggle-label {
  font-size: 12px;
  color: var(--text-muted);
}

/* ===== Main Layout ===== */
.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  height: calc(100vh - 73px);
}

/* ===== Editor Panel ===== */
.editor-panel {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  transition: border-color var(--transition);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  transition: border-color var(--transition);
}

.panel-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}

.char-count {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.editor-area {
  flex: 1;
  position: relative;
}

#articleInput {
  width: 100%;
  height: 100%;
  padding: 20px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.8;
  resize: none;
  outline: none;
  transition: color var(--transition);
}

#articleInput::placeholder {
  color: var(--text-muted);
}

.editor-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  transition: border-color var(--transition);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-sans);
  cursor: pointer;
  border: none;
  transition: all var(--transition);
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px var(--accent-glow);
}

.btn-primary:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 16px var(--accent-glow);
  transform: translateY(-1px);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ===== Results Panel ===== */
.results-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.results-content {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.results-content::-webkit-scrollbar {
  width: 6px;
}

.results-content::-webkit-scrollbar-track {
  background: transparent;
}

.results-content::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px;
  text-align: center;
}

.empty-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  font-size: 28px;
}

.empty-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}

.empty-desc {
  font-size: 13px;
  color: var(--text-muted);
  max-width: 280px;
  line-height: 1.6;
}

/* Loading State */
.loading-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px;
  text-align: center;
}

.loading-state.active {
  display: flex;
}

.loading-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 14px;
  color: var(--text-secondary);
}

.loading-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Category Filters */
.filter-bar {
  display: none;
  gap: 6px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  transition: border-color var(--transition);
}

.filter-bar.visible {
  display: flex;
}

.filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  transition: all var(--transition);
}

.filter-btn:hover {
  background: var(--bg-hover);
}

.filter-btn.active {
  border-color: var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
}

.filter-count {
  background: var(--bg-hover);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 11px;
  font-family: var(--font-mono);
}

.filter-btn.active .filter-count {
  background: var(--accent);
  color: #fff;
}

/* Stats Summary */
.stats-summary {
  display: none;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  transition: border-color var(--transition);
}

.stats-summary.visible {
  display: block;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.stat-card {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  text-align: center;
}

.stat-card.spelling { background: var(--error-bg); }
.stat-card.expression { background: var(--warning-bg); }
.stat-card.structure { background: var(--info-bg); }
.stat-card.ethics { background: var(--success-bg); }

.stat-value {
  font-size: 22px;
  font-weight: 700;
  font-family: var(--font-mono);
}

.stat-card.spelling .stat-value { color: var(--error); }
.stat-card.expression .stat-value { color: var(--warning); }
.stat-card.structure .stat-value { color: var(--info); }
.stat-card.ethics .stat-value { color: var(--success); }

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Correction Items */
.corrections-list {
  padding: 12px 20px 20px;
}

.correction-item {
  padding: 16px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  transition: all var(--transition);
  animation: fadeSlideIn 0.3s ease both;
}

.correction-item:hover {
  border-color: var(--border-focus);
  box-shadow: 0 2px 8px var(--accent-glow);
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.correction-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.correction-badges {
  display: flex;
  align-items: center;
  gap: 6px;
}

.badge {
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.badge-spelling { background: var(--error-bg); color: var(--error); }
.badge-expression { background: var(--warning-bg); color: var(--warning); }
.badge-structure { background: var(--info-bg); color: var(--info); }
.badge-ethics { background: var(--success-bg); color: var(--success); }

.severity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.severity-error { background: var(--error); box-shadow: 0 0 6px var(--error-bg); }
.severity-warning { background: var(--warning); box-shadow: 0 0 6px var(--warning-bg); }
.severity-info { background: var(--info); box-shadow: 0 0 6px var(--info-bg); }

.correction-diff {
  margin-bottom: 10px;
  font-size: 14px;
  line-height: 1.7;
}

.diff-del {
  background: var(--diff-del-bg);
  color: var(--diff-del-text);
  padding: 2px 4px;
  border-radius: 3px;
  text-decoration: line-through;
}

.diff-add {
  background: var(--diff-add-bg);
  color: var(--diff-add-text);
  padding: 2px 4px;
  border-radius: 3px;
}

.diff-arrow {
  margin: 0 6px;
  color: var(--text-muted);
  font-size: 12px;
}

.diff-manual {
  background: var(--warning-bg);
  color: var(--warning);
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 12px;
  font-weight: 600;
  border: 1px dashed var(--warning);
}

.correction-reason {
  font-size: 13px;
  color: var(--text-secondary);
  padding-left: 12px;
  border-left: 2px solid var(--border);
  line-height: 1.6;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .main {
    grid-template-columns: 1fr;
    height: auto;
  }

  .editor-panel {
    border-right: none;
    border-bottom: 1px solid var(--border);
    min-height: 40vh;
  }

  .results-panel {
    min-height: 50vh;
  }

  .header {
    padding: 12px 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .header-actions {
    flex-wrap: wrap;
    gap: 8px;
  }

  .api-key-area input {
    width: 140px !important;
  }

  .logo-text {
    font-size: 17px;
  }

  .logo-sub {
    display: none;
  }

  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .score-label {
    display: none;
  }
}

@media (max-width: 480px) {
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .filter-bar {
    padding: 10px 14px;
  }
}

/* ===== Utility ===== */
.hidden { display: none !important; }

/* Error message */
.error-message {
  display: none;
  padding: 12px 20px;
  margin: 12px 20px;
  border-radius: var(--radius-sm);
  background: var(--error-bg);
  color: var(--error);
  font-size: 13px;
  border: 1px solid rgba(245, 85, 93, 0.2);
}

.error-message.visible {
  display: block;
}

/* Pulse animation for analyze button */
@keyframes pulse {
  0%, 100% { box-shadow: 0 2px 8px var(--accent-glow); }
  50% { box-shadow: 0 4px 20px var(--accent-glow); }
}

.btn-primary.pulse {
  animation: pulse 2s ease infinite;
}

/* ===== AI Proofread Button ===== */
.btn-ai {
  background: linear-gradient(135deg, #8b5cf6, #6c7ae0, #4dacf0);
  color: #fff;
  box-shadow: 0 2px 12px rgba(139, 92, 246, 0.3);
  position: relative;
  overflow: hidden;
}

.btn-ai::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
  animation: aiShimmer 3s ease infinite;
}

@keyframes aiShimmer {
  0% { transform: translateX(-100%) rotate(45deg); }
  100% { transform: translateX(100%) rotate(45deg); }
}

.btn-ai:hover {
  background: linear-gradient(135deg, #9b6ff6, #7c8af0, #5dbcff);
  box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
  transform: translateY(-1px);
}

.btn-ai:active {
  transform: translateY(0);
}

.btn-ai:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-ai:disabled::before {
  animation: none;
}

/* AI Loading State */
.ai-loading-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px;
  text-align: center;
}

.ai-loading-state.active {
  display: flex;
}

.ai-loading-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-radius: 50%;
  margin-bottom: 20px;
  position: relative;
  animation: aiPulseRing 1.5s ease infinite;
}

.ai-loading-spinner::before,
.ai-loading-spinner::after {
  content: '';
  position: absolute;
  border-radius: 50%;
}

.ai-loading-spinner::before {
  inset: 3px;
  border: 2px solid transparent;
  border-top-color: #8b5cf6;
  border-right-color: #6c7ae0;
  animation: spin 0.8s linear infinite;
}

.ai-loading-spinner::after {
  inset: 8px;
  border: 2px solid transparent;
  border-bottom-color: #4dacf0;
  animation: spin 1.2s linear infinite reverse;
}

@keyframes aiPulseRing {
  0%, 100% { border-color: var(--border); }
  50% { border-color: rgba(139, 92, 246, 0.3); }
}

.ai-loading-text {
  font-size: 14px;
  color: var(--text-secondary);
  background: linear-gradient(90deg, #8b5cf6, #6c7ae0, #4dacf0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 600;
}

.ai-loading-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* AI Result Styles */
.ai-result-container {
  padding: 20px;
}

.ai-result-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.ai-result-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(108,122,224,0.15));
  color: #8b5cf6;
  border: 1px solid rgba(139,92,246,0.2);
}

[data-theme="light"] .ai-result-badge {
  color: #7c3aed;
  background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(108,122,224,0.1));
}

.ai-result-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
}

.ai-result-body {
  font-size: 14px;
  line-height: 1.85;
  color: var(--text-primary);
}

.ai-result-body h1,
.ai-result-body h2,
.ai-result-body h3,
.ai-result-body h4 {
  margin-top: 20px;
  margin-bottom: 10px;
  color: var(--text-primary);
  font-weight: 700;
}

.ai-result-body h1 { font-size: 20px; }
.ai-result-body h2 { font-size: 17px; }
.ai-result-body h3 { font-size: 15px; }
.ai-result-body h4 { font-size: 14px; }

.ai-result-body p {
  margin-bottom: 10px;
}

.ai-result-body strong {
  color: var(--accent);
  font-weight: 700;
}

.ai-result-body ul,
.ai-result-body ol {
  margin: 8px 0 12px 20px;
}

.ai-result-body li {
  margin-bottom: 6px;
  line-height: 1.7;
}

.ai-result-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}

.ai-result-body code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
}

.ai-result-body blockquote {

</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">N</div>
    <div>
      <div class="logo-text">뉴스 에디터</div>
      <div class="logo-sub">기사 수정 도우미</div>
    </div>
  </div>

        <div class="score-value" id="scoreValue">—</div>
      </div>
      <span class="score-label">기사 점수</span>

    <div class="api-key-area" style="display:flex;align-items:center;gap:8px;">

        <input type="password" id="apiKeyInput" placeholder="Anthropic API Key"
          style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);
          color:var(--text-primary);padding:6px 32px 6px 10px;font-size:12px;width:180px;
          transition:border-color var(--transition);outline:none;"
          onfocus="this.style.borderColor='var(--border-focus)'"
          onblur="this.style.borderColor='var(--border)'">
        <button id="apiKeyToggle" type="button" title="키 표시/숨김"
          style="position:absolute;right:6px;background:none;border:none;color:var(--text-muted);
          cursor:pointer;padding:2px;font-size:14px;line-height:1;">&#128065;</button>
      </div>
      <span id="apiKeyStatus" style="font-size:11px;color:var(--text-muted);white-space:nowrap;"></span>

    <div style="display:flex;align-items:center;gap:8px;">
      <span class="theme-toggle-label">&#9790;</span>

      <span class="theme-toggle-label">&#9788;</span>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="main">
  <!-- Editor Panel -->
  <section class="editor-panel">
    <div class="panel-header">
      <span class="panel-title">기사 입력</span>
      <span class="char-count" id="charCount">0자</span>
    </div>
    <div class="editor-area">
      <textarea id="articleInput" placeholder="여기에 기사를 입력하세요...

예시:
서울시는 오늘 새로운 교통 정책을 발표했다. 이번 정책은 시민들의 교통 편의를 높이기 위해 마련됐으며, 전문가들은 긍정적인 반응을 보이고 있다.

기자가 작성한 기사를 붙여넣으면 맞춤법, 표현, 구조, 언론 윤리 등을 종합적으로 분석합니다."></textarea>
    </div>
    <div class="editor-footer">
      <button class="btn btn-secondary" id="clearBtn" type="button">지우기</button>
      <button class="btn btn-ai pulse" id="analyzeBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M12.5 3.5l-1.4 1.4M4.9 11.1l-1.4 1.4"/>
          <circle cx="8" cy="8" r="2.5" fill="currentColor" opacity="0.3"/>
        </svg>
        AI 교정
      </button>
    </div>
  </section>

  <!-- Results Panel -->
  <section class="results-panel">
    <div class="panel-header">
      <span class="panel-title">분석 결과</span>
      <span class="char-count" id="issueCount"></span>
    </div>

    <!-- Category Filters -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-category="all">
        전체 <span class="filter-count" id="countAll">0</span>
      </button>
      <button class="filter-btn" data-category="spelling">
        맞춤법 <span class="filter-count" id="countSpelling">0</span>
      </button>
      <button class="filter-btn" data-category="expression">
        표현 <span class="filter-count" id="countExpression">0</span>
      </button>
      <button class="filter-btn" data-category="structure">
        구조 <span class="filter-count" id="countStructure">0</span>
      </button>
      <button class="filter-btn" data-category="ethics">
        윤리 <span class="filter-count" id="countEthics">0</span>
      </button>
    </div>

    <!-- Stats Summary -->
    <div class="stats-summary" id="statsSummary">
      <div class="stats-grid">
        <div class="stat-card spelling">
          <div class="stat-value" id="statSpelling">0</div>
          <div class="stat-label">맞춤법</div>
        </div>
        <div class="stat-card expression">
          <div class="stat-value" id="statExpression">0</div>
          <div class="stat-label">표현</div>
        </div>
        <div class="stat-card structure">
          <div class="stat-value" id="statStructure">0</div>
          <div class="stat-label">구조</div>
        </div>
        <div class="stat-card ethics">
          <div class="stat-value" id="statEthics">0</div>
          <div class="stat-label">윤리</div>
        </div>
      </div>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Results Content -->
    <div class="results-content" id="resultsContent">
      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">&#9998;</div>
        <div class="empty-title">분석 대기 중</div>
        <div class="empty-desc">좌측에 기사를 입력하고 "AI 교정" 버튼을 클릭하면 규칙 기반 분석과 AI 교정을 동시에 수행합니다.</div>
      </div>

      <!-- Loading State -->
      <div class="loading-state" id="loadingState">
        <div class="loading-spinner"></div>
        <div class="loading-text">기사를 분석하고 있습니다</div>
        <div class="loading-sub">잠시만 기다려 주세요...</div>
      </div>

      <!-- AI Loading State -->
      <div class="ai-loading-state" id="aiLoadingState">
        <div class="ai-loading-spinner"></div>
        <div class="ai-loading-text">AI가 기사를 분석하고 있습니다</div>
        <div class="ai-loading-sub">Claude가 교정 중입니다... 잠시만 기다려 주세요.</div>
      </div>

      <!-- Corrections List -->
      <div class="corrections-list hidden" id="correctionsList"></div>
    </div>
  </section>
</main>

<script>
// ===== 기사 분석 엔진 — 신입기자 기사수정 가이드 기반 =====
// 카테고리: spelling (맞춤법/표기), expression (표현/문체), structure (구조), ethics (정확성/윤리)

const _engineRules = [
  // ============================================================
  // 1. 맞춤법/표기 (spelling)
  // ============================================================

  // 1-1. 자주 틀리는 맞춤법
  { pattern: /않된다/g, replacement: '안 된다', category: 'spelling', reason: "'안'은 부사('아니'의 줄임), '않'은 보조 용언('아니하'의 줄임)입니다.", severity: 'error' },
  { pattern: /않되/g, replacement: '안 되', category: 'spelling', reason: "'안'은 부사('아니'의 줄임), '않'은 보조 용언('아니하'의 줄임)입니다.", severity: 'error' },
  { pattern: /돼었/g, replacement: '되었', category: 'spelling', reason: "'돼'는 '되어'의 줄임말입니다. '되어었다'는 성립하지 않습니다.", severity: 'error' },
  { pattern: /들어나/g, replacement: '드러나', category: 'spelling', reason: "'드러나다'가 표준 표기입니다. '들어나다'는 존재하지 않는 단어입니다.", severity: 'error' },
  { pattern: /어떻해/g, replacement: '어떡해', category: 'spelling', reason: "'어떠하게 해'를 축약한 형태가 '어떡해'입니다.", severity: 'error' },
  { pattern: /웬지/g, replacement: '왠지', category: 'spelling', reason: "'왠지'는 '왜인지'의 준말입니다. '웬'은 '어찌 된'이라는 다른 뜻입니다.", severity: 'error' },
  { pattern: /촛점/g, replacement: '초점', category: 'spelling', reason: "사이시옷이 적용되지 않는 한자어 결합입니다.", severity: 'error' },
  { pattern: /알맞는/g, replacement: '알맞은', category: 'spelling', reason: "'알맞다'는 형용사이므로 관형사형은 '-은'입니다.", severity: 'error' },
  { pattern: /회계년도/g, replacement: '회계연도', category: 'spelling', reason: "표준어는 '연도'입니다. '년도'는 비표준입니다.", severity: 'error' },
  { pattern: /어의없/g, replacement: '어이없', category: 'spelling', reason: "'어이없다'가 표준어입니다. '어의(御醫)'는 다른 단어입니다.", severity: 'error' },
  { pattern: /모자른/g, replacement: '모자란', category: 'spelling', reason: "기본형이 '모자라다'이므로 '모자란'이 올바릅니다.", severity: 'error' },
  { pattern: /담배를 피다/g, replacement: '담배를 피우다', category: 'spelling', reason: "'피다'는 자동사, '피우다'는 타동사입니다. 목적어가 있으므로 '피우다'를 씁니다.", severity: 'error' },

  // 1-2. 외래어 표기
  { pattern: /컨텐츠/g, replacement: '콘텐츠', category: 'spelling', reason: "영어 'con-'은 '콘'으로 표기합니다 (국립국어원 외래어 표기법).", severity: 'error' },
  { pattern: /메세지/g, replacement: '메시지', category: 'spelling', reason: "영어 [sɪdʒ]는 '시'에 가깝습니다 (외래어 표기법).", severity: 'error' },
  { pattern: /악세사리/g, replacement: '액세서리', category: 'spelling', reason: "일본어식 발음 영향을 배제한 표준 표기입니다.", severity: 'error' },
  { pattern: /시물레이션/g, replacement: '시뮬레이션', category: 'spelling', reason: "영어 'si-mu-'는 '시뮬'이 표준입니다.", severity: 'error' },

  // 1-3. 띄어쓰기
  { pattern: /첫번째/g, replacement: '첫 번째', category: 'spelling', reason: "관형사 + 의존명사는 띄어 씁니다.", severity: 'error' },
  { pattern: /두번째/g, replacement: '두 번째', category: 'spelling', reason: "관형사 + 의존명사는 띄어 씁니다.", severity: 'error' },
  { pattern: /세번째/g, replacement: '세 번째', category: 'spelling', reason: "관형사 + 의존명사는 띄어 씁니다.", severity: 'error' },
  { pattern: /다음주/g, replacement: '다음 주', category: 'spelling', reason: "'다음'과 '주'는 별개의 단어입니다.", severity: 'error' },
  { pattern: /다음달/g, replacement: '다음 달', category: 'spelling', reason: "'다음'과 '달'은 별개의 단어입니다.", severity: 'error' },
  { pattern: /이틀만에/g, replacement: '이틀 만에', category: 'spelling', reason: "시간 경과의 의존명사 '만'은 띄어 씁니다.", severity: 'error' },
  { pattern: /(\d+일)만에/g, replacement: '$1 만에', category: 'spelling', reason: "시간 경과의 의존명사 '만'은 띄어 씁니다.", severity: 'error' },

  // 1-4. 유사어 혼동
  { pattern: /입맛이 땡/g, replacement: '입맛이 당', category: 'spelling', reason: "'당기다'가 표준어입니다. '땡기다'는 비표준입니다.", severity: 'error' },

  // ============================================================
  // 2. 표현/문체 (expression)
  // ============================================================

  // 2-1. 번역체 표현
  { pattern: /에 있어서?\b/g, replacement: '', category: 'expression', reason: "번역체 표현입니다. 삭제하거나 적절한 조사로 대체하세요. (영어 'in ~ing' / 일본어 '~において' 직역)", severity: 'warning', noAutoReplace: true },
  { pattern: /으?로부터 /g, replacement: '에게서 ', category: 'expression', reason: "'~로부터'는 영어 'from'의 직역입니다. '~에게서'가 자연스럽습니다.", severity: 'warning' },
  { pattern: /에 대하여/g, replacement: '을', category: 'expression', reason: "'~에 대하여'는 영어 'about'의 직역입니다. 조사로 대체하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /에 대한 /g, replacement: '', category: 'expression', reason: "'~에 대한'은 번역체입니다. 조사 '의' 또는 직접 연결로 대체하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /에 의해 /g, replacement: '', category: 'expression', reason: "'~에 의해'는 영어 수동태 직역입니다. 능동문으로 전환하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /의 경우[,\s]/g, replacement: '', category: 'expression', reason: "'~의 경우'는 영어 'in the case of' 직역입니다. '~은/는'으로 대체하세요.", severity: 'warning', noAutoReplace: true },

  // 2-2. 이중 피동
  { pattern: /잊혀지/g, replacement: '잊히', category: 'expression', reason: "이중 피동입니다. '잊다→잊히다'가 올바른 피동형입니다.", severity: 'error' },
  { pattern: /쓰여지/g, replacement: '쓰이', category: 'expression', reason: "이중 피동입니다. '쓰다→쓰이다'가 올바른 피동형입니다.", severity: 'error' },
  { pattern: /작성되어지/g, replacement: '작성되', category: 'expression', reason: "이중 피동입니다. '-되다'에 '-어지다'가 중복되었습니다.", severity: 'error' },
  { pattern: /불리우/g, replacement: '불리', category: 'expression', reason: "이중 피동입니다. '부르다→불리다'가 올바른 형태입니다.", severity: 'error' },
  { pattern: /만들어지/g, replacement: '만들', category: 'expression', reason: "이중 피동입니다. 능동문으로 전환하는 것을 권장합니다.", severity: 'info', noAutoReplace: true },

  // 2-3. 불필요한 사동 '-시키다'
  { pattern: /입금시키/g, replacement: '입금하', category: 'expression', reason: "과도한 사동 표현입니다. '-하다'로 충분합니다.", severity: 'warning' },
  { pattern: /활성화시키/g, replacement: '활성화하', category: 'expression', reason: "과도한 사동 표현입니다. '-하다'로 충분합니다.", severity: 'warning' },
  { pattern: /소개시켜/g, replacement: '소개해', category: 'expression', reason: "과도한 사동 표현입니다. '-하다'로 충분합니다.", severity: 'warning' },
  { pattern: /감소시키/g, replacement: '줄이', category: 'expression', reason: "과도한 사동 표현입니다. '줄이다'가 자연스럽습니다.", severity: 'warning' },
  { pattern: /증가시키/g, replacement: '늘리', category: 'expression', reason: "과도한 사동 표현입니다. '늘리다'가 자연스럽습니다.", severity: 'warning' },
  { pattern: /변화시키/g, replacement: '바꾸', category: 'expression', reason: "과도한 사동 표현입니다. '바꾸다'가 자연스럽습니다.", severity: 'warning' },

  // 2-4. 중복 표현
  { pattern: /과반수 이상/g, replacement: '과반수', category: 'expression', reason: "'과반수'가 이미 '절반을 넘는 수'를 뜻하므로 '이상'은 중복입니다.", severity: 'warning' },
  { pattern: /옥상 위에서/g, replacement: '옥상에서', category: 'expression', reason: "'옥상'이 이미 건물 꼭대기를 뜻하므로 '위에서'는 중복입니다.", severity: 'warning' },
  { pattern: /처음 첫/g, replacement: '첫', category: 'expression', reason: "'처음'과 '첫'은 같은 의미이므로 중복입니다.", severity: 'warning' },
  { pattern: /역전앞/g, replacement: '역 앞', category: 'expression', reason: "'역전(驛前)'이 이미 '역 앞'의 뜻이므로 중복입니다.", severity: 'warning' },
  { pattern: /거의 대부분/g, replacement: '대부분', category: 'expression', reason: "'거의'와 '대부분'은 의미가 중복됩니다.", severity: 'warning' },
  { pattern: /모든 사람들/g, replacement: '모든 사람', category: 'expression', reason: "'모든'이 이미 복수를 나타내므로 '들'은 불필요합니다.", severity: 'warning' },

  // 2-5. 진행형 남용
  { pattern: /하고 있는 중이/g, replacement: '하고 있', category: 'expression', reason: "'~하고 있는 중'은 이중 진행 표현입니다.", severity: 'warning' },

  // ============================================================
  // 3. 정확성/윤리 (ethics)
  // ============================================================

  // 3-1. 차별 표현 — 성차별
  { pattern: /여류 /g, replacement: '', category: 'ethics', reason: "'여류'는 남성형을 기본으로 여성형을 파생시킨 성차별 표현입니다. 성별 구분 없이 직함만 쓰세요.", severity: 'error', noAutoReplace: true },
  { pattern: /여기자/g, replacement: '기자', category: 'ethics', reason: "'여기자'는 '기자는 남자'라는 전제를 내포한 성차별 표현입니다.", severity: 'warning' },
  { pattern: /미망인/g, replacement: '배우자', category: 'ethics', reason: "'미망인(未亡人)'은 '아직 죽지 못한 사람'이라는 뜻으로 차별적 표현입니다.", severity: 'error' },

  // 3-2. 차별 표현 — 장애인
  { pattern: /장애우/g, replacement: '장애인', category: 'ethics', reason: "'장애우'는 비장애인 입장에서 타자화하는 동정적 표현입니다.", severity: 'error' },
  { pattern: /정신지체/g, replacement: '지적장애', category: 'ethics', reason: "2008년 법 개정으로 '지적장애'로 용어가 변경되었습니다.", severity: 'error' },
  { pattern: /눈먼 돈/g, replacement: '주인 없는 돈', category: 'ethics', reason: "시각장애를 비하하는 표현입니다.", severity: 'error' },
  { pattern: /절름발이/g, replacement: '불완전한', category: 'ethics', reason: "지체장애를 비하하는 표현입니다.", severity: 'error' },
  { pattern: /장애를 앓/g, replacement: '장애가 있', category: 'ethics', reason: "장애는 질병이 아닙니다. '앓다' 대신 '있다'를 사용하세요.", severity: 'error' },
  { pattern: /결정 장애/g, replacement: '우유부단', category: 'ethics', reason: "장애를 부정적 비유로 사용하는 표현입니다.", severity: 'warning' },

  // 3-3. 차별 표현 — 이주민
  { pattern: /불법체류자/g, replacement: '미등록 이주민', category: 'ethics', reason: "'불법'이 인간 자체를 규정하는 차별적 표현입니다.", severity: 'error' },

  // 3-4. 선정적/과장 표현
  { pattern: /충격[!！\s,]/g, replacement: '', category: 'ethics', reason: "'충격'은 근거 없는 감정적·선정적 표현입니다. 구체적 사실로 대체하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /역대급/g, replacement: '', category: 'ethics', reason: "'역대급'은 과장 표현입니다. 구체적 수치로 대체하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /경악/g, replacement: '', category: 'ethics', reason: "'경악'은 선정적 표현입니다. 객관적 서술로 대체하세요.", severity: 'warning', noAutoReplace: true },

  // 3-5. 모호한 출처
  { pattern: /업계에서는/g, replacement: '', category: 'ethics', reason: "모호한 출처입니다. 구체적 인물명, 직책, 소속을 밝히세요.", severity: 'info', noAutoReplace: true },
  { pattern: /전문가들은/g, replacement: '', category: 'ethics', reason: "모호한 출처입니다. 구체적 전문가의 이름과 소속을 밝히세요.", severity: 'info', noAutoReplace: true },
  { pattern: /관계자에 따르면/g, replacement: '', category: 'ethics', reason: "모호한 출처입니다. 구체적 인물명과 직책을 밝히세요.", severity: 'info', noAutoReplace: true },
];

// ===== 구조 분석 =====
function _checkStructure(text) {
  const corrections = [];
  const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);

  // 리드(첫 문장) 길이 체크
  if (paragraphs.length > 0) {
    const firstParagraph = paragraphs[0].trim();
    const firstSentenceMatch = firstParagraph.match(/^[^.!?。]*[.!?。]/);
    const firstSentence = firstSentenceMatch ? firstSentenceMatch[0] : firstParagraph;
    const cleanLen = firstSentence.replace(/\s+/g, '').length;

    if (cleanLen > 60) {
      corrections.push({
        category: 'structure',
        original: firstSentence.substring(0, 50) + '...',
        suggested: '리드를 60자 이내로 줄이세요',
        reason: '리드(첫 문장)가 ' + cleanLen + '자입니다. 60자 이내가 적정합니다. 핵심만 전달하고 세부 사항은 본문에서 서술하세요.',
        startIndex: 0,
        endIndex: firstSentence.length,
        severity: 'warning'
      });
    }

    // 질문형 리드 감지
    if (/[?？]/.test(firstSentence) || /나요|습니까|입니까|을까요|ㄹ까요|는가\?/.test(firstSentence)) {
      corrections.push({
        category: 'structure',
        original: firstSentence.substring(0, 50) + (firstSentence.length > 50 ? '...' : ''),
        suggested: '질문형 대신 사실을 직접 전달하는 리드로 바꾸세요',
        reason: '독자는 뉴스를 읽으러 왔지 퀴즈를 풀러 온 것이 아닙니다. 질문형 리드는 지양합니다.',
        startIndex: 0,
        endIndex: firstSentence.length,
        severity: 'warning'
      });
    }
  }

  // 단락 길이 체크 (5문장 초과)
  paragraphs.forEach(function(para) {
    const sentences = para.split(/[.!?。]\s*/).filter(function(s) { return s.trim().length > 0; });
    if (sentences.length > 5) {
      const paraStart = text.indexOf(para);
      corrections.push({
        category: 'structure',
        original: para.substring(0, 50) + '...',
        suggested: '단락을 2~3문장 단위로 나누세요',
        reason: '이 단락이 ' + sentences.length + '문장으로 너무 깁니다. 신문 기사의 단락은 2~3문장이 적정합니다.',
        startIndex: paraStart >= 0 ? paraStart : 0,
        endIndex: paraStart >= 0 ? paraStart + para.length : para.length,
        severity: 'warning'
      });
    }
  });

  // '~에 따르면' 호응 체크
  const allSentences = text.split(/(?<=[.!?。])\s+/);
  allSentences.forEach(function(sentence) {
    if (/에 따르면/.test(sentence)) {
      if (!/다고\s*(한다|밝혔다|전했다|말했다|설명했다|보도했다|발표했다|알려졌다|전해졌다)/.test(sentence) &&
          !/라고\s*(한다|밝혔다|전했다|말했다|설명했다|보도했다|발표했다)/.test(sentence)) {
        var sIdx = text.indexOf(sentence);
        corrections.push({
          category: 'structure',
          original: sentence.substring(0, 50) + (sentence.length > 50 ? '...' : ''),
          suggested: "문장 끝을 '~다고 한다/밝혔다' 형태로 호응시키세요",
          reason: "'~에 따르면'으로 시작한 문장은 '~다고 한다/밝혔다'로 끝나야 호응이 맞습니다.",
          startIndex: sIdx >= 0 ? sIdx : 0,
          endIndex: sIdx >= 0 ? sIdx + sentence.length : sentence.length,
          severity: 'warning'
        });
      }
    }
  });

  return corrections;
}

// ===== 메인 분석 함수 =====
async function analyzeArticle(text) {
  if (!text || text.trim().length === 0) {
    return {
      corrections: [],
      stats: { totalIssues: 0, byCategory: { spelling: 0, expression: 0, structure: 0, ethics: 0 }, score: 100 }
    };
  }

  const corrections = [];

  // 규칙 기반 매칭
  _engineRules.forEach(function(rule) {
    const regex = new RegExp(rule.pattern.source, rule.pattern.flags);
    let match;
    while ((match = regex.exec(text)) !== null) {
      const original = match[0];
      let suggested;
      if (rule.noAutoReplace) {
        suggested = '(수정 필요) ' + (rule.replacement || '삭제 또는 대체 권장');
      } else {
        suggested = original.replace(new RegExp(rule.pattern.source, ''), rule.replacement);
      }
      corrections.push({
        category: rule.category,
        original: original,
        suggested: suggested,
        reason: rule.reason,
        startIndex: match.index,
        endIndex: match.index + original.length,
        severity: rule.severity
      });
    }
  });

  // 구조 분석
  corrections.push.apply(corrections, _checkStructure(text));

  // 위치 기준 정렬
  corrections.sort(function(a, b) { return a.startIndex - b.startIndex; });

  // 통계 계산
  const byCategory = { spelling: 0, expression: 0, structure: 0, ethics: 0 };
  corrections.forEach(function(c) {
    if (byCategory[c.category] !== undefined) byCategory[c.category]++;
  });

  const totalIssues = corrections.length;

  // 점수: 100점 기준, error -5, warning -3, info -1
  let deductions = 0;
  corrections.forEach(function(c) {
    if (c.severity === 'error') deductions += 5;
    else if (c.severity === 'warning') deductions += 3;
    else deductions += 1;
  });
  const score = Math.max(0, 100 - deductions);

  return {
    corrections: corrections,
    stats: { totalIssues: totalIssues, byCategory: byCategory, score: score }
  };
}
</script>

<script>
// ===== UI Logic =====
(function() {
  'use strict';

  // DOM References
  const articleInput = document.getElementById('articleInput');
  const charCount = document.getElementById('charCount');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const clearBtn = document.getElementById('clearBtn');
  const themeToggle = document.getElementById('themeToggle');

  const scoreValue = document.getElementById('scoreValue');

  // aiProofBtn removed — unified into analyzeBtn

  const CATEGORY_LABELS = {
    spelling: '맞춤법',
    expression: '표현',

  };

  const SEVERITY_LABELS = {
    error: '오류',

  };

  let isAnalyzing = false;

  // Character count

    charCount.textContent = articleInput.value.length + '자';
  });

  // Theme toggle
  themeToggle.addEventListener('click', () => {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  });

  // Clear button
  clearBtn.addEventListener('click', () => {
    articleInput.value = '';
    charCount.textContent = '0자';
    resetResults();
  });

  // Unified analyze button: rule-based + AI proofreading
  analyzeBtn.addEventListener('click', async () => {
    const text = articleInput.value.trim();
    if (!text) {
      showError('기사를 입력해 주세요.');
      return;
    }
    if (text.length < 10) {
      showError('최소 10자 이상 입력해 주세요.');
      return;
    }
    await runUnifiedAnalysis(text);
  });

  // Keyboard shortcut: Ctrl/Cmd + Enter
  articleInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      analyzeBtn.click();
    }
  });

  // Filter buttons
  filterBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const category = btn.dataset.category;
    activeFilter = category;

    btn.classList.add('active');

  async function runUnifiedAnalysis(text) {

    analyzeBtn.disabled = true;
    analyzeBtn.classList.remove('pulse');
    hideError();
    showLoading();

    // 1단계: 규칙 기반 분석 (즉시)
    try {
      const result = await analyzeArticle(text);
      currentResult = result;
      showResults(result);
    } catch (err) {
      // 규칙 분석 실패해도 AI 교정은 계속 진행

    } finally {
      isAnalyzing = false;
      hideLoading();
    }

    // 2단계: AI 교정 (Anthropic Claude)
    const claudeApiKey = getClaudeApiKey();
    if (!claudeApiKey) {
      appendAiError('API 키를 입력하면 AI 교정도 함께 수행됩니다. 우측 상단에 Anthropic API Key를 입력하세요.');
      analyzeBtn.disabled = false;
      isAiAnalyzing = false;
      return;
    }

    showAiLoading();
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 60000);

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': claudeApiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        signal: controller.signal,
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4096,
          system: AI_SYSTEM_PROMPT,
          messages: [{
            role: 'user',
            content: '다음 기사를 교정해주세요:\n\n' + text
          }]
        })
      });

      clearTimeout(timeoutId);

      if (!response.ok) {
        const status = response.status;
        if (status === 401) {
          throw new Error('API 키가 올바르지 않습니다. Anthropic API 키를 확인해주세요.');
        } else if (status === 403) {
          throw new Error('API 접근 권한이 없습니다. API 키 설정을 확인해주세요.');
        } else if (status === 429) {
          throw new Error('요청 제한에 도달했습니다. 잠시 후 다시 시도해 주세요.');
        } else if (status >= 500) {
          throw new Error('AI 서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
        } else {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error?.message || 'API 요청 실패 (HTTP ' + status + ')');
        }
      }

      const data = await response.json();
      const aiText = data.content
        && data.content[0]
        && data.content[0].text;

      if (!aiText) {
        throw new Error('AI로부터 유효한 응답을 받지 못했습니다.');
      }

      hideAiLoading();
      // AI 결과를 규칙 분석 결과 아래에 추가
      appendAiResult(aiText);

    } catch (err) {
      hideAiLoading();
      if (err.name === 'AbortError') {
        appendAiError('AI 응답 시간이 초과되었습니다.');
      } else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('network')) {
        appendAiError('네트워크 연결을 확인해주세요.');
      } else {
        appendAiError(err.message || 'AI 교정 중 오류가 발생했습니다.');
      }
    } finally {
      clearTimeout(timeoutId);
      isAiAnalyzing = false;
      analyzeBtn.disabled = false;
    }
  }

  function showResults(result) {
    hideLoading();
    emptyState.style.display = 'none';

    // Update score
    const score = result.stats.score;
    updateScore(score);

    // Update stats
    const bc = result.stats.byCategory;
    document.getElementById('statSpelling').textContent = bc.spelling || 0;
    document.getElementById('statExpression').textContent = bc.expression || 0;
    document.getElementById('statStructure').textContent = bc.structure || 0;
    document.getElementById('statEthics').textContent = bc.ethics || 0;
    statsSummary.classList.add('visible');

    // Update filter counts
    document.getElementById('countAll').textContent = result.stats.totalIssues;
    document.getElementById('countSpelling').textContent = bc.spelling || 0;
    document.getElementById('countExpression').textContent = bc.expression || 0;
    document.getElementById('countStructure').textContent = bc.structure || 0;
    document.getElementById('countEthics').textContent = bc.ethics || 0;
    filterBar.classList.add('visible');

    // Issue count
    issueCount.textContent = result.stats.totalIssues + '건 발견';

    // Reset filter
    activeFilter = 'all';
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    filterBar.querySelector('[data-category="all"]').classList.add('active');

    // Render corrections
    renderCorrections();
  }

  function renderCorrections() {
    if (!currentResult) return;
    correctionsList.classList.remove('hidden');

    const corrections = activeFilter === 'all'
      ? currentResult.corrections
      : currentResult.corrections.filter(c => c.category === activeFilter);

    if (corrections.length === 0) {
      correctionsList.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px;">' +
        (activeFilter === 'all' ? '수정 사항이 없습니다. 훌륭한 기사입니다!' : '해당 카테고리의 수정 사항이 없습니다.') +
        '</div>';
      return;
    }

    correctionsList.innerHTML = corrections.map((c, i) => {
      const badgeClass = 'badge-' + c.category;
      const severityClass = 'severity-' + c.severity;
      const isManualReview = c.suggested.startsWith('(수정 필요)');
      const diffHtml = isManualReview
        ? `<div class="correction-diff">
            <span class="diff-del">${escapeHtml(c.original)}</span>
            <span class="diff-arrow">&#10132;</span>
            <span class="diff-manual">직접 수정 필요</span>
          </div>`
        : `<div class="correction-diff">
            <span class="diff-del">${escapeHtml(c.original)}</span>
            <span class="diff-arrow">&#10132;</span>
            <span class="diff-add">${escapeHtml(c.suggested)}</span>
          </div>`;
      return `
        <div class="correction-item" style="animation-delay:${i * 0.05}s">
          <div class="correction-header">
            <div class="correction-badges">
              <span class="badge ${badgeClass}">${CATEGORY_LABELS[c.category] || c.category}</span>
              <span class="severity-dot ${severityClass}" title="${SEVERITY_LABELS[c.severity] || c.severity}"></span>
            </div>
          </div>
          ${diffHtml}
          <div class="correction-reason">${escapeHtml(c.reason)}</div>
        </div>
      `;
    }).join('');
  }

  function updateScore(score) {
    scoreDisplay.classList.add('visible');
    const circumference = 2 * Math.PI * 18; // r=18
    const offset = circumference * (1 - score / 100);
    const ring = scoreRing;

    let color;
    if (score >= 80) color = getComputedStyle(document.documentElement).getPropertyValue('--success').trim();
    else if (score >= 60) color = getComputedStyle(document.documentElement).getPropertyValue('--warning').trim();
    else color = getComputedStyle(document.documentElement).getPropertyValue('--error').trim();

    ring.style.stroke = color;
    ring.style.strokeDashoffset = offset;
    scoreValue.textContent = score;
    scoreValue.style.color = color;
  }

  function showLoading() {
    emptyState.style.display = 'none';
    correctionsList.classList.add('hidden');
    aiLoadingState.classList.remove('active');

  function showError(msg) {

    errorMessage.classList.add('visible');

  function hideError() {

  }

  function resetResults() {

    statsSummary.classList.remove('visible');
    correctionsList.classList.add('hidden');
    correctionsList.innerHTML = '';
    emptyState.style.display = '';

  function escapeHtml(str) {

  }

  // ===== AI Proofreading =====
  const AI_SYSTEM_PROMPT = `당신은 신문사의 수석 교열 기자입니다. 아래 "기사 수정 가이드"를 숙지한 뒤, 신입 기자가 작성한 기사 초안을 검토하고 수정 제안을 해주세요.

- **수정 후**: 교정된 표현

마지막에 전체적인 기사 평가와 개선 방향도 제시해주세요.

# 기자를 위한 기사 수정 가이드

> 이 가이드는 신문사 신입 기자들이 기사를 작성하고 수정할 때 참고할 수 있도록, 실제 언론 현장에서 발생한 수정 사례들을 체계적으로 정리한 것입니다. 각 사례에는 수정 전/후 비교와 수정 이유를 포함하여 왜 그렇게 고쳐야 하는지를 이해할 수 있게 했습니다.

---

## 제1장: 문장과 표현

기사의 기본 단위는 문장이다. 아무리 좋은 취재를 해도 문장이 정확하지 않으면 독자에게 제대로 전달되지 않는다. 이 장에서는 신입 기자가 가장 자주 범하는 문장 수준의 오류를 다룬다.

### 1.1 맞춤법과 띄어쓰기

기사의 신뢰는 맞춤법에서 시작된다. 맞춤법 오류가 있는 기사는 내용의 정확성까지 의심받는다.

#### 자주 틀리는 맞춤법

수정 전 (틀림)수정 후 (올바름)수정 이유않된다안 된다'안'은 '아니'의 줄임말(부사). '않'은 '아니하'의 줄임말(보조 용언).돼었다되었다'돼'는 '되어'의 줄임말. '되어었다'는 성립하지 않음.들어나다드러나다'드러나다'가 표준 표기. '들어나다'는 존재하지 않는 단어.어떻해어떡해'어떠하게 해'를 축약한 형태가 '어떡해'.웬지왠지'왠지'는 '왜인지'의 준말. '웬'은 '어찌 된'이라는 다른 뜻.촛점초점사이시옷이 적용되지 않는 한자어 결합.알맞는알맞은'알맞다'는 형용사이므로 관형사형은 '-은'. '-는'은 동사에 사용.회계년도회계연도표준어는 '연도'. '년도'는 비표준.

> **출처**: 슬로우뉴스, 뉴스와이어 보도자료 맞춤법 가이드

#### 자주 틀리는 띄어쓰기

수정 전수정 후규칙첫번째첫 번째관형사 + 의존명사는 띄어 쓴다.다음주다음 주'다음'과 '주'는 별개의 단어.이틀만에이틀 만에시간 경과의 의존명사 '만'은 띄어 쓴다.간지 5년간 지 5년시간 경과의 의존명사 '지'는 앞말과 띄어 쓴다.이틀 간의이틀간의기간을 나타내는 '간'은 접미사이므로 붙여 쓴다.기업간 경쟁기업 간 경쟁관계를 나타내는 '간'은 의존명사이므로 띄어 쓴다.이것 뿐이다이것뿐이다명사 뒤의 '뿐'은 붙여 쓴다.

> **팁**: '만'과 '간'은 맥락에 따라 붙여 쓰기/띄어 쓰기가 달라진다. '만'이 '~뿐'의 뜻이면 붙이고, 시간 경과면 띄운다. '간'이 기간이면 붙이고, 관계면 띄운다.

#### 자주 틀리는 외래어 표기

수정 전수정 후근거컨텐츠콘텐츠영어 'con-'은 '콘'으로 표기메세지메시지영어 [sɪdʒ]는 '시'에 가까움악세사리액세서리일본어식 발음 영향 배제시물레이션시뮬레이션영어 'si-mu-'는 '시뮬'이 표준

> **출처**: 국립국어원 외래어 표기법, 뉴스와이어

### 1.2 비문과 주술 호응

비문은 문법적으로 완결되지 않은 문장이다. 기사에서 가장 흔한 비문은 **주술 호응 오류**다.

#### 사례 1: 의존명사 주어와 서술어 불일치

-   **수정 전**: "기계를 이용할 때의 장점은 힘이 덜 든다."

-   **수정 후**: "기계를 이용할 때의 장점은 힘이 덜 든다**는 것이다**."

-   **수정 이유**: 주어 '장점은'에 대응하는 서술어가 '~것이다' 형태여야 호응이 맞는다.


#### 사례 2: '이유는 ~때문이다' 호응

-   **수정 전**: "그가 실연한 이유는 그녀 앞에서 코를 후볐다."

-   **수정 후**: "그가 실연한 이유는 그녀 앞에서 코를 후볐**기 때문이다**."

-   **수정 이유**: '이유는'이라는 주어에는 '~때문이다'라는 서술어가 호응해야 한다.


#### 사례 3: 주어-동사 부적합

-   **수정 전**: "대학생들이 이력서를 접수했다."

-   **수정 후**: "대학생들이 이력서를 **제출했다**." / "회사가 이력서를 접수했다."

-   **수정 이유**: '접수하다'는 받는 쪽이 주어일 때 사용한다. 제출하는 쪽이 주어면 '내다/제출하다'가 올바르다.


#### 사례 4: 필수 성분 생략

-   **수정 전**: "남 전 시장이 당시 재선을 염두"

-   **수정 후**: "남 전 시장이 당시 재선을 **염두에 두고**"

-   **수정 이유**: '염두'는 '-하다'를 붙일 수 없는 명사. '염두에 두다'가 올바른 연어다.


> **원칙**: 문장을 쓴 뒤 주어를 찾고, 서술어가 그 주어에 호응하는지 확인한다. 특히 '~것은/이유는/장점은' 같은 의존명사 주어는 서술어에도 대응하는 형식이 필요하다.

### 1.3 중복 표현과 군더더기

불필요한 단어를 빼면 기사가 간결하고 힘 있어진다.

수정 전수정 후수정 이유과반수 이상이 찬성과반수가 찬성'과반수'가 이미 '절반을 넘는 수'를 뜻함옥상 위에서옥상에서'옥상'이 이미 건물 꼭대기수면 아래로 가라앉았다물속으로 가라앉았다'가라앉다'가 이미 아래로 내려가는 의미 포함모든 사람들이모든 사람이'모든'이 이미 복수를 나타냄. '들' 남발은 번역체

#### '~에 따르면' 군더더기

-   **수정 전**: "시에 따르면 시가 신청한 '청풍호 자드락길' 사업이 선정됐다."

-   **수정 후**: "시는 14일 시가 신청한 '청풍호 자드락길' 사업이 선정됐다고 밝혔다."

-   **수정 이유**: '~에 따르면'으로 시작하면 문장 끝을 '~라고 한다/밝혔다'로 맞추어야 한다. 아니면 주어를 '~은/는'으로 바꾸어 간결하게 쓴다.


> **출처**: 충북인뉴스 "군더더기와 지나친 생략"

### 1.4 번역체 표현

영어나 일본어의 문장 구조를 한국어에 그대로 옮긴 번역체는 기사의 가독성을 떨어뜨린다.

번역체 표현자연스러운 한국어원인~에 있어삭제 또는 조사로 대체영어 'in ~ing' / 일본어 '~において'~로부터 받은~에게서 받은영어 'from'의 직역~에 대하여조사('의', '을')로 대체영어 'about'의 직역~에 의해 빌려졌다(능동문으로 전환) 빌렸다영어 수동태 직역~의 경우~은/는영어 'in the case of' 직역수많은 무리들이수많은 무리가영어 복수형 '-s'의 영향

#### 사례

-   **수정 전**: "한국의 경우, 출산율이 낮다."

-   **수정 후**: "한국은 출산율이 낮다."

-   **수정 이유**: '~의 경우'를 조사 '은/는'으로 대체하면 즉시 간결해진다.


> **출처**: 우리말 살려쓰기, 나무위키 "번역체 문장"

### 1.5 피동/사동 오용

한국어 기사에서 가장 흔한 문법 오류 중 하나가 이중 피동이다.

수정 전 (이중 피동)수정 후설명잊혀지다잊히다'잊다→잊히다'가 올바른 피동. '-어지다' 중복쓰여지다쓰이다'쓰다→쓰이다'가 올바른 피동작성되어졌다작성되었다'-되다'에 '-어지다' 중복. 가능하면 능동문으로불리우다불리다'부르다→불리다'. '-우-'는 불필요한 사동 접미사

> **원칙**: 피동 접미사(-이/-히/-리/-기)가 붙은 단어에 다시 '-어지다'를 붙이지 않는다. 가능하면 능동문으로 쓰는 것이 기사체에 적합하다.

### 1.6 조사 오용

#### '로서'와 '로써'

-   **로서**: 자격/신분/지위 → "아마추어**로서**는 상당히 힘든 라이였다."

-   **로써**: 수단/도구/방법 → "노력**으로써** 성공했다."


#### '~에 대한' 남용

-   **수정 전**: "현 정권의 개혁에 대한 의지"

-   **수정 후**: "현 정권의 개혁 의지"

-   **수정 이유**: 조사 '의'로 충분히 대체 가능한데 '~에 대한'을 쓰면 번역체가 된다.

## 제2장: 기사 구조와 형식

아무리 정확한 정보도 잘못된 구조로 전달하면 독자에게 닿지 않는다. 이 장에서는 기사의 뼈대인 구조와 형식의 수정 사례를 다룬다.

### 2.1 리드(첫 문단) 작성

리드는 기사의 얼굴이다. 독자는 리드를 보고 기사를 읽을지 결정한다.

#### 사례 1: 뻔한 사실로 시작하는 리드

-   **수정 전**: "시의회는 월요일 밤 시청에서 회의를 개최했다."

-   **수정 후**: "서울시의회는 월요일 2026년 예산안 1조 2천억 원을 확정했다."

-   **수정 이유**: '회의를 했다'는 뉴스가 아니다. 회의에서 **결정된 것**이 뉴스다.


#### 사례 2: 출처가 먼저 나오는 리드

-   **수정 전**: "시장은 화요일 청중에게 새 경기장이 건설될 것이라고 말했다."

-   **수정 후**: "내년에 새 경기장이 건설된다고 시장이 화요일 밝혔다."

-   **수정 이유**: 가장 중요한 것은 뉴스(새 경기장 건설)이지, 누가 말했는지가 아니다.


#### 사례 3: 너무 긴 리드

-   **수정 전**: "서울시 강남구에 사는 김모(45)씨가 2026년 3월 25일 오후 3시경 강남역 인근 횡단보도에서 신호를 무시하고 달려온 승용차에 치여 병원으로 옮겨져 치료를 받았으나 같은 날 오후 7시경 사망한 것으로 경찰이 밝혔다." (94자)

-   **수정 후**: "25일 강남역 인근에서 신호 위반 차량에 치인 보행자 김모(45)씨가 숨졌다." (35자)

-   **수정 이유**: 리드는 60자 이내가 적정하다. 핵심만 전달하고, 세부 사항은 본문에서 서술한다.


#### 사례 4: 질문형 리드

-   **수정 전**: "여러분은 올해 세금이 얼마나 오를지 아시나요?"

-   **수정 후**: "올해 1인당 평균 소득세 부담이 지난해보다 12만 원 늘어난다."

-   **수정 이유**: 독자는 뉴스를 읽으러 왔지, 퀴즈를 풀러 온 것이 아니다.


#### 사례 5: 결론 없는 리드

-   **수정 전**: "A쇼핑몰이 물류 시스템을 전면 개편했다."

-   **수정 후**: "A쇼핑몰이 출고 공정을 바꿔 평균 배송일을 2.3일에서 1.6일로 단축했다."

-   **수정 이유**: '개편했다'는 수단이지 결과가 아니다. 리드는 '무엇이 어떻게 바뀌었는가'를 담아야 한다.


> **리드 작성 체크리스트**
>
> 항목기준길이60자 이내, 1~2문장5W1H최소 Who, What, When 포함핵심가장 중요한 사실/결론이 첫 문장에형식질문형, 추측형 지양

---

### 2.2 역피라미드 구조

역피라미드는 가장 중요한 사실을 맨 앞에, 덜 중요한 정보를 뒤에 배치하는 기사 구조다.

#### 사례 1: 시간순 나열 — 역피라미드 위반

-   **수정 전**: "오전 9시 A장관이 국회에 도착했다. 10시부터 국정감사가 시작됐다. 야당이 예산 문제를 지적했다. 오후 3시 A장관이 '사퇴하겠다'고 밝혔다."

-   **수정 후**: "A장관이 국정감사 도중 사퇴 의사를 밝혔다. 야당의 예산 집행 부실 추궁이 이어지던 25일 오후 국회에서다."

-   **수정 이유**: 가장 중요한 사실(장관 사퇴)이 기사 끝에 묻혀 있다. 편집자가 뒷부분을 잘라내면 핵심이 사라진다.


#### 사례 2: 배경 설명이 리드를 압도

-   **수정 전**: "지난 2020년부터 정부는 탄소중립 정책을 추진해왔다. 파리협정 이후... (배경 3문장)... 정부가 오늘 2030년까지 탄소배출 40% 감축 목표를 발표했다."

-   **수정 후**: "정부가 2030년까지 탄소배출량을 40% 줄이겠다고 공식 발표했다. 파리협정 이후 국제 압력이 커진 데 따른 것이다."

-   **수정 이유**: 배경 설명은 2~3번째 단락에 배치한다. 리드에서는 '오늘 무슨 일이 일어났는가'를 바로 전달한다.


#### 사례 3: 인명 피해가 기사 끝에

-   **수정 전**: "이번 사고로 도로가 2시간 통제됐다. 경찰 50명이 출동했다. 차량은 소나타였다. 이 사고로 1명이 사망하고 2명이 중상을 입었다."

-   **수정 후**: "25일 서울외곽순환도로에서 승용차 추돌 사고로 1명이 숨지고 2명이 중상을 입었다."

-   **수정 이유**: 인명 피해가 가장 중요한 정보다. 사상자 → 사고 경위 → 교통 영향 순으로 배치한다.


> **역피라미드 구조 순서**
>
> 1.  **리드**: 핵심 사실 요약
>
> 2.  **구체적 설명**: 리드의 세부 사항
>
> 3.  **배경/맥락**: 사건의 배경 정보
>
> 4.  **부가 정보**: 관련 사항, 덜 중요한 세부
>

---

### 2.3 기사 제목

제목은 독자가 기사를 클릭하게 만드는 첫 번째 문장이다. 정확하고 구체적이어야 한다.

#### 사례 1: 낚시성 제목

-   **수정 전**: "김광현 전 소속팀, 류현진 옛 동료와 1년 계약 합의"

-   **수정 후**: "세인트루이스 카디널스, 코리 디커슨과 1년 계약 합의"

-   **수정 이유**: 기사 내용과 직접 관련 없는 한국인 선수 이름으로 클릭을 유도하는 전형적 낚시성 제목.


#### 사례 2: 모호한 제목

-   **수정 전**: "정부, 새 정책 발표"

-   **수정 후**: "정부, 2030년 탄소배출 40% 감축 목표 확정"

-   **수정 이유**: 제목만 보고 무슨 일이 일어났는지 알 수 있어야 한다.


#### 사례 3: 과장 제목

-   **수정 전**: "충격! 역대급 한파 덮친다...생존 위협 수준"

-   **수정 후**: "이번 주말 전국 영하 15도 이하...올겨울 최저 기온 예상"

-   **수정 이유**: '충격', '역대급', '생존 위협'은 근거 없는 감정적 표현이다. 구체적 수치로 핵심을 전달한다.


#### 사례 4: 피동형 제목

-   **수정 전**: "대학 등록금이 인상될 전망이다"

-   **수정 후**: "교육부, 대학 등록금 인상 허용 방침"

-   **수정 이유**: 피동형은 힘이 없고 책임 주체가 불분명하다. 능동형이 간결하고 직접적이다.


> **제목 작성 원칙**
>
> -   8~12자 내외
>
> -   구체적 사실 포함 (수치, 고유명사)
>
> -   능동형 선호
>
> -   감정적·선정적 표현 지양
>
> -   기사 내용과 일치
>

### 2.4 인용문 처리

인용문은 기사의 신뢰도를 좌우한다. 직접인용과 간접인용을 정확히 구분해야 한다.

#### 직접인용 vs 간접인용

유형따옴표조사내용직접인용" " 사용~라고원문 그대로간접인용사용 안 함~고기자가 재구성

#### 사례 1: 직접인용과 간접인용 혼동

-   **수정 전**: "이번 사업은 반드시 성공시키겠다"**고** 김 대표가 말했다.

-   **수정 후 (직접인용)**: 김 대표는 "이번 사업은 반드시 성공시키겠다"**라고** 말했다.

-   **수정 후 (간접인용)**: 김 대표는 이번 사업을 반드시 성공시키겠다**고** 말했다.

-   **수정 이유**: 따옴표를 쓰면서 간접인용 조사 '고'를 쓰는 것은 문법 오류다.


#### 사례 2: 직접인용에서 발언 변형

-   **수정 전**: 김 장관은 "향후 정책을 재검토하여 국민 편의를 증진하는 방향으로 수정하겠다"고 밝혔다. (실제 발언: "정책을 다시 살펴보고 고치겠습니다")

-   **수정 후**: 김 장관은 "정책을 다시 살펴보고 고치겠습니다"라고 밝혔다.

-   **수정 이유**: 직접인용(큰따옴표)은 원래 말 그대로 적어야 한다. 의역하려면 간접인용으로 전환한다.


#### 사례 3: 모호한 출처

-   **수정 전**: 업계에서는 "올해 반도체 경기가 회복될 것"이라는 전망이 나온다.

-   **수정 후**: 삼성전자 반도체 부문 이모 부사장은 "올해 반도체 경기가 회복될 것"이라고 전망했다.

-   **수정 이유**: '업계에서는'이라는 모호한 출처는 신뢰성을 떨어뜨린다. 구체적 인물명, 직책, 소속을 밝힌다.


#### 사례 4: '~에 따르면' 호응 미완결

-   **수정 전**: "경찰에 따르면 용의자는 술에 취한 상태였다."

-   **수정 후**: "경찰에 따르면 용의자는 술에 취한 상태였다**고 한다**." 또는 "경찰은 용의자가 술에 취한 상태였다**고 밝혔다**."

-   **수정 이유**: '~에 따르면'으로 시작하면 문장 끝을 '~다고 한다/밝혔다'로 호응시켜야 한다.


---

### 2.5 단락 구성

#### 사례 1: 한 단락에 여러 주제 혼재

-   **수정 전**: "정부는 새 주택 정책을 발표했다. 강남 아파트 가격이 5% 상승했다. 한편 미국 연준은 금리를 동결했다. 전문가들은 시장 안정을 전망했다."

-   **수정 후**: 국내 정책 단락 / 해외 금리 단락으로 분리

-   **수정 이유**: 한 단락은 하나의 주제만 다룬다.


#### 사례 2: 단락이 지나치게 김

-   **원칙**: 신문 기사의 단락은 보통 2~3문장이 적정하다. 온라인 환경에서는 특히 짧은 단락이 가독성을 높인다.


#### 사례 3: 단락 간 연결 부족

-   **수정 전**: "서울시가 요금을 인상했다." / "시민단체가 반대했다." / "시장이 기자회견을 열었다."

-   **수정 후**: 각 단락에 구체적 정보를 보충하고, '이에', '같은 날' 등 전환어로 논리적 흐름을 만든다.


---

### 2.6 기사 유형별 구조

#### 스트레이트 기사: 기자 의견 삽입 금지

-   **수정 전**: "이번 대책은 기존 정책의 실패를 인정한 것으로 볼 수 있다."

-   **수정 후**: "김모 연구위원은 '기존 정책과 차별점을 찾기 어렵다'고 평가했다."

-   **수정 이유**: 스트레이트 기사에서 '~로 볼 수 있다'는 기자의 해석이다. 전문가 인용으로 대체한다.


#### 피처 기사: 역피라미드 강제 적용 금지

-   **수정 전**: "김영희씨(35)가 올해 세계 바리스타 대회에서 우승했다." (역피라미드)

-   **수정 후**: "새벽 4시, 서울 종로의 한 카페에 불이 켜진다. 김영희씨(35)가 에스프레소 머신 앞에 선다." (내러티브)

-   **수정 이유**: 피처 기사는 이야기 구조를 활용한다. 장면 묘사로 시작하여 독자를 끌어들인다.


#### 기획 기사: 사례 나열만으로는 부족

-   **수정 전**: "A회사는 재택근무를 도입했다. B회사도 시작했다. C회사는 주 4일제를 실시한다."

-   **수정 후**: "국내 IT 기업 10곳 중 7곳이 유연근무제를 도입했다. 전문가들은 코로나 이후 근무 형태가 구조적으로 변했다고 분석한다."

-   **수정 이유**: 기획 기사는 추세 분석, 배경 설명, 전문가 견해 종합이 필요하다.


---

### 2.7 사진 캡션

#### 사례 1: 주관적 평가가 들어간 캡션

-   **수정 전**: "혁신적인 신제품 발표회에서 멋진 프레젠테이션을 하는 김 대표의 모습."

-   **수정 후**: "25일 서울 코엑스에서 열린 신제품 발표회에서 김모 대표가 제품 기능을 설명하고 있다."

-   **수정 이유**: '혁신적인', '멋진'은 주관적 평가다. 캡션은 사실만 기술한다.


#### 사례 2: '~모습' 남발

-   **수정 전**: "공장에서 작업하는 모습이다."

-   **수정 후**: "3월 기준, 출고 공정 변경 후 직원들이 포장 작업을 진행하고 있다."

-   **수정 이유**: '~모습이다'는 아무 정보도 전달하지 않는다. 6하원칙에 따라 구체적으로 쓴다.


> **캡션 원칙**: 장소, 날짜, 행위를 구체적으로 서술한다. 현재 진행형('~하고 있다')으로 맺는다. 추측('~것 같다')은 쓰지 않는다.

## 제3장: 정확성과 윤리

기사의 생명은 정확성이다. 사실 오류가 있으면 기사의 나머지 모든 것이 의미를 잃는다. 이 장에서는 팩트체크, 통계 사용, 공정성, 인권 표현에 관한 수정 사례를 다룬다.

### 3.1 사실 확인(팩트체크)

#### 사례 1: 상관관계와 인과관계 혼동

-   **수정 전**: "지하철역에서 가까이 살수록 비만 확률 낮아진다"

-   **수정 후**: "지하철역과의 거리와 비만율 사이에 양의 상관관계가 있다"

-   **수정 이유**: 연구에서 밝혀진 것은 상관관계일 뿐인데, '~할수록 ~한다' 구문으로 인과관계를 단정 지었다.


> **원칙**: "A하면 B다"와 "A와 B가 함께 나타난다"는 다른 의미다. 연구 결과를 보도할 때는 인과관계인지 상관관계인지 반드시 확인한다.

#### 사례 2: 미확인 정보 보도

-   **사례**: 정의기억연대 관련 가짜 뉴스 — 13건 중 11건이 사실 무근으로 확인되어 정정보도 또는 기사 삭제 처리

-   **교훈**: 출처가 불분명하거나 확인되지 않은 사실을 보도할 때는 그 사유를 분명히 밝혀야 한다. (신문윤리실천요강 제3조)


---

### 3.2 수치와 통계 사용

통계는 기사에 신뢰를 더하지만, 잘못 사용하면 왜곡의 도구가 된다.

#### 사례 1: 조세와 금융상품 혼동

-   **수정 전**: "1800만 원 새차, 1년 세금만 1200만 원"

-   **문제**: 1200만 원에 서울도시철도채권(공채) 404만 원이 포함되어 있으나, 공채는 금융상품이지 세금이 아님

-   **교훈**: 수치를 인용할 때는 구성 항목을 확인하고, 성격이 다른 항목을 묶지 않는다.


#### 사례 2: 상대값과 절대값

-   **수정 전**: "특정 음식 섭취 시 암 발생률 2배 증가"

-   **수정 후**: "A 집단 암 발생률 1%, B 집단 2%로 1%p 차이"

-   **수정 이유**: '2배'(상대값)만 강조하면 실제 위험도를 과장하게 된다. 절대값을 함께 제시해야 독자가 정확히 판단할 수 있다.


#### 사례 3: 비교 기준 상이

-   **사례**: 역대 정부 고용 동향을 비교하면서 비교 시점을 통일하지 않아(2월 vs 7월) 특정 정부만 악화된 것처럼 보도

-   **교훈**: 통계를 비교할 때는 시점, 기준, 인구 구조 변화를 반드시 통일한다.


#### 사례 4: 자의적 지표 조합

-   **수정 전**: "'사실상 백수' 450만 명"

-   **문제**: 통계청 공식 지표가 아닌 자의적으로 구성한 수치. 추가 근로 의사가 없는 인구까지 포함하여 과장

-   **교훈**: 공식 통계 용어와 비공식 표현을 구분하고, 자의적 지표를 만들어 사용하지 않는다.


> **통계 보도 체크리스트**
>
> -   수치의 출처가 공식적인가?
>
> -   비교 기준(시점, 대상)이 동일한가?
>
> -   상대값과 절대값을 함께 제시했는가?
>
> -   인구 구조 변화 등 맥락 요인을 고려했는가?
>
> -   상관관계를 인과관계로 단정하지 않았는가?
>

---

### 3.3 출처 표기

#### 타사 보도 인용 시 출처 명시

-   **수정 전**: "언론 보도에 따르면..."

-   **수정 후**: "○○일보 ○월 ○일자 보도에 따르면..."

-   **수정 이유**: 타사의 단독 보도를 인용하면서 출처를 밝히지 않는 것은 언론 윤리 위반이다.


> **출처 표기 원칙** (신문윤리실천요강): "취재원이나 출처를 밝혀야 하며, 추상적이거나 일반적인 취재원을 빙자하여 보도해서는 안 된다."

#### 통신 기사 출처 표시

-   통신사 기사를 사용할 때는 반드시 "\[○○통신 제공\]" 또는 "○○통신 ○○○ 기자" 등으로 출처를 명확히 표기한다.

-   2022년 인터넷신문 기사 중 저작물 인용·전재 위반 사례가 35.9%(1,815건)에 달했다.


---

### 3.4 공정성과 균형

#### 사례 1: 사실과 의견 혼동

-   **수정 전**: 기사 본문에서 "이번 정책은 실패한 것으로 보인다"를 사실처럼 서술

-   **수정 후**: 사실 보도와 의견/해석을 분리. "전문가들은 ~로 평가한다" 등 출처와 함께 제시

-   **관련 근거**: "사실과 의견을 명확히 구분하여 보도해야 한다" (신문윤리실천요강 제3조)


#### 사례 2: 반론 누락

-   **수정 전**: 특정 정책에 대해 비판적 시각만 보도

-   **수정 후**: 비판 측 의견 + 정책 담당자의 해명/반론을 함께 게재

-   **관련 근거**: "경합 중인 사안에서 한 쪽의 주장을 편파적으로 보도하지 않는다. 비판적 내용을 포함할 때에는 상대방에게 해명, 반론의 기회를 주고 반드시 반영한다." (신문윤리실천요강)


#### 사례 3: 기사형 광고 혼동

-   **수정 전**: 광고임을 알리는 표시 없이 일반 기사와 동일한 형식으로 게재

-   **수정 후**: "광고", "후원", "협찬" 등을 기사 상단에 명확히 표기

-   **교훈**: 2011년 '도깨비쿠폰 사건' — 독자들이 광고와 기사를 구분하지 못해 피해 발생


---

### 3.5 인권과 차별 표현

기사는 사회적 인식에 큰 영향을 미친다. 차별적 표현은 편견을 재생산한다.

#### 성차별 표현

수정 전수정 후수정 이유여류 작가작가남성형을 기본으로 여성형을 파생시킨 차별 표현여기자기자'기자는 남자'라는 전제를 내포미망인(未亡人)배우자'아직 죽지 못한 사람'이라는 뜻으로 여성을 부속물로 봄

> **관련 근거**: 인권보도준칙 성평등 분야 — "성별과 성 역할에 대한 고정관념을 강화하는 성차별적 표현을 사용하지 않는다."

#### 장애인 관련 표현

수정 전수정 후수정 이유장애우장애인'장애우'는 비장애인 입장에서 타자화하는 동정적 표현정신지체지적장애2008년 법 개정으로 용어 변경벙어리 냉가슴말 못할 속사정장애를 비하·조롱하는 일상 표현

#### 주의할 표현

수정 전수정 후수정 이유불법체류자미등록 이주민'불법'이 인간 자체를 규정하는 표현전라도 출신답게~(삭제)지역 스테레오타입 강화, 지역감정 조장정신질환을 앓고 있는 ○○○이 범행을~○○○이 범행을~범행과 무관한 질환 노출은 편견 조장

> **관련 근거**: 인권보도준칙 (한국기자협회·국가인권위원회 공동 제정) — 인격권, 장애인, 성평등, 이주민, 아동, 성적소수자 등 8개 분야

### 3.6 선정성 자제

#### 사례 1: 성폭력 사건의 선정적 묘사

-   **수정 전**: "나체로", "알몸으로" 등 불필요한 신체 묘사

-   **수정 후**: 선정적 묘사 삭제, 사건의 본질(범죄 사실)에 집중

-   **수정 이유**: 선정적 보도는 피해자에 대한 2차 가해를 유발한다.


#### 사례 2: 자살 보도

-   **수정 전**: "극단적 선택을 했다", "목매 숨져", "투신 사망"

-   **수정 후**: "사망했다", "숨졌다" (가치 중립적 용어)

-   **수정 이유**: '극단적 선택'도 자살을 '선택 사항'인 것처럼 오인하게 한다. 구체적 방법 묘사는 모방 자살(베르테르 효과) 유발 위험이 있다.

-   **관련 근거**: 자살예방 보도준칙 4.0 (2024년 11월, 보건복지부·한국기자협회·한국자살예방센터 공동 제정)


#### 사례 3: 제목의 인용부호 남용

-   **문제**: 기사 제목에 직접인용부호를 사용하나 해당 인용문이 본문에 없는 경우 약 60%

-   **원칙**: 제목의 인용은 본문에 실제 존재하는 발언만 사용한다. 선정적 발언을 발췌해 제목으로 뽑는 것은 언론 신뢰를 해친다.

## 특별 섹션: 표현·구조·정확성의 교차 영역

기사의 세 가지 요소(표현, 구조, 정확성)는 독립적이지 않다. 한 영역의 오류가 다른 영역의 문제로 이어지는 경우가 많다. 이 교차 영역을 인식하면 하나의 오류가 연쇄적으로 기사 품질을 떨어뜨리는 것을 막을 수 있다.

### 표현 오류 → 정확성 훼손

표현 오류정확성 영향'육안'을 '유관'으로 오표기단어 자체의 의미가 바뀌어 사실관계 변경'과반수 이상' 중복 표현수치를 실제보다 과장된 것처럼 인식하게 함주술 호응 오류 ('대학생들이 이력서를 접수했다')행위 주체가 바뀌어 사실관계 자체가 달라짐'~할수록 ~한다' 인과 구문 오용상관관계를 인과관계로 단정짓는 사실 왜곡

### 구조 오류 → 정확성 훼손

구조 오류정확성 영향낚시성 제목기사 내용과 다른 인상을 주어 '제목을 통한 오보'로 기능모호한 인용 출처 ('업계에서는', '전문가들은')정확성 검증의 사각지대를 만들어 미확인 정보가 사실처럼 유통직접인용에서 발언 변형따옴표 안 내용이 실제 발언과 달라 발언 왜곡역피라미드 위반 (핵심이 기사 끝)편집 과정에서 핵심 정보가 잘리면 불완전한 보도가 됨

### 정확성 오류 → 표현·구조 문제

정확성 오류표현·구조 영향통계 비교 기준 불일치기사 구조 전체가 잘못된 전제 위에 세워짐사실과 의견 혼동스트레이트 기사의 문체와 구조가 무너짐반론 누락기사의 균형 잡힌 구조 자체가 성립하지 않음

> **교훈**: 맞춤법을 고치는 것이 단순한 교정이 아닐 수 있다. 표현 하나의 오류가 사실관계를 바꾸고, 구조 하나의 실수가 공정성을 해칠 수 있다. 세 영역을 항상 함께 점검해야 한다.

## 부록: 자주 틀리는 표현 체크리스트

기사 제출 전 아래 항목을 점검한다.

### A. 맞춤법/표기

-   '안 되다' vs '않다' 구분했는가?

-   '되다/돼다' 활용이 올바른가? ('되어'로 바꿔 자연스러우면 '되')

-   외래어 표기법을 따랐는가? (콘텐츠, 메시지, 액세서리)

-   의존명사('만', '지', '간', '뿐') 띄어쓰기가 올바른가?


### B. 문장

-   주어와 서술어가 호응하는가?

-   이중 피동(-히 + -어지다)이 없는가?

-   번역체 표현('~에 있어', '~에 의해', '~의 경우')을 제거했는가?

-   중복 표현('과반수 이상', '모든 ~들')이 없는가?

-   '~에 따르면'으로 시작한 문장이 '~고 한다/밝혔다'로 끝나는가?


### C. 구조

-   리드가 60자 이내이고 핵심 사실을 담고 있는가?

-   역피라미드 구조를 따르고 있는가? (가장 중요한 사실이 맨 앞)

-   제목이 구체적이고 기사 내용과 일치하는가?

-   직접인용은 원문 그대로이고, 간접인용과 혼동하지 않았는가?

-   인용 출처가 구체적으로 명시되어 있는가?

-   한 단락에 하나의 주제만 다루고 있는가?


### D. 정확성/윤리

-   모든 사실(인명, 날짜, 수치, 직함)을 확인했는가?

-   통계의 출처가 공식적이고 비교 기준이 동일한가?

-   상관관계를 인과관계로 단정하지 않았는가?

-   사실과 의견을 명확히 구분했는가?

-   경합 사안에서 반론을 포함했는가?

-   성차별·장애인 비하·지역 차별 표현이 없는가?

-   피해자 신원이 불필요하게 노출되지 않았는가?

-   선정적·자극적 표현을 자제했는가?

  function markdownToHtml(md) {
    let html = md;

    // Escape HTML entities first
    html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Headings (#### before ### before ## before #)
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Horizontal rules
    html = html.replace(/^---+$/gm, '<hr>');

    // Bold and italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Blockquotes
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // Unordered lists: convert consecutive "- " lines into <ul><li>...</li></ul>
    html = html.replace(/(^- .+$(\n- .+$)*)/gm, function(block) {
      const items = block.split('\n').map(function(line) {
        return '<li>' + line.replace(/^- /, '') + '</li>';
      }).join('');
      return '<ul>' + items + '</ul>';
    });

    // Ordered lists: convert consecutive "1. " lines
    html = html.replace(/(^\d+\. .+$(\n\d+\. .+$)*)/gm, function(block) {
      const items = block.split('\n').map(function(line) {
        return '<li>' + line.replace(/^\d+\. /, '') + '</li>';
      }).join('');
      return '<ol>' + items + '</ol>';
    });

    // Paragraphs: wrap remaining lines not inside tags
    html = html.split('\n\n').map(function(block) {
      block = block.trim();
      if (!block) return '';
      if (/^<(h[1-4]|ul|ol|blockquote|hr|li|p)/.test(block)) return block;
      return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');

    return html;
  }
