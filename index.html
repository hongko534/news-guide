<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기사 교정기</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:          #0f1117;
  --bg-surface:  #1a1b23;
  --bg-elevated: #23242f;
  --bg-muted:    #181920;
  --text:        #e4e4e7;
  --text-muted:  #9ca3af;
  --border:      #2e2f3a;
  --accent:      #6366f1;
  --accent-hover:#818cf8;
  --success:     #22c55e;
  --danger:      #ef4444;
  --diff-del-bg: rgba(239,68,68,.18);
  --diff-del-text:#fca5a5;
  --diff-ins-bg: rgba(34,197,94,.18);
  --diff-ins-text:#86efac;
  --radius:      12px;
  --radius-sm:   8px;
  --shadow:      0 4px 24px rgba(0,0,0,.3);
  --transition:  .25s cubic-bezier(.4,0,.2,1);
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
}

[data-theme="light"]{
  --bg:          #f8f9fa;
  --bg-surface:  #ffffff;
  --bg-elevated: #f1f3f5;
  --bg-muted:    #e9ecef;
  --text:        #1a1b23;
  --text-muted:  #6b7280;
  --border:      #dee2e6;
  --shadow:      0 4px 24px rgba(0,0,0,.08);
  --diff-del-bg: rgba(239,68,68,.12);
  --diff-del-text:#b91c1c;
  --diff-ins-bg: rgba(34,197,94,.12);
  --diff-ins-text:#15803d;
}

html{font-size:16px}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background var(--transition),color var(--transition);
  line-height:1.7;
}

/* ─── Nav ─── */
.nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:16px;
  padding:12px 24px;
  background:var(--bg-surface);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.nav-logo{
  font-size:1.15rem;font-weight:700;
  color:var(--accent);white-space:nowrap;
}
.nav-spacer{flex:1}
.api-key-wrap{
  display:flex;align-items:center;gap:8px;
  font-size:.82rem;
}
.api-key-wrap label{color:var(--text-muted);white-space:nowrap}
.api-key-input{
  width:220px;padding:6px 10px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg);color:var(--text);
  font-size:.82rem;font-family:monospace;
  transition:border var(--transition);
}
.api-key-input:focus{outline:none;border-color:var(--accent)}
.api-key-status{font-size:.75rem;color:var(--text-muted)}
.theme-btn{
  background:none;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:6px 10px;cursor:pointer;color:var(--text);font-size:1rem;
  transition:all var(--transition);
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ─── Screens ─── */
.screen{display:none;animation:fadeIn .35s ease}
.screen.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ─── Input Screen ─── */
.input-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 24px;min-height:calc(100vh - 57px);
}
.input-screen h1{
  font-size:1.6rem;font-weight:700;margin-bottom:8px;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.input-screen p{color:var(--text-muted);margin-bottom:32px;font-size:.95rem}
.input-area{width:100%;max-width:720px}
.article-textarea{
  width:100%;min-height:280px;max-height:60vh;
  padding:20px;resize:vertical;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg-surface);color:var(--text);
  font-family:var(--font);font-size:1rem;line-height:1.8;
  transition:border var(--transition);
}
.article-textarea:focus{outline:none;border-color:var(--accent)}
.article-textarea::placeholder{color:var(--text-muted)}
.input-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;
}
.char-count{font-size:.82rem;color:var(--text-muted)}
.btn-primary{
  padding:12px 32px;border:none;border-radius:var(--radius-sm);
  background:var(--accent);color:#fff;
  font-size:1rem;font-weight:600;cursor:pointer;
  transition:all var(--transition);
}
.btn-primary:hover:not(:disabled){background:var(--accent-hover);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* ─── Compare Screen ─── */
.compare-screen{
  flex:1;padding:0;min-height:calc(100vh - 57px);
}
.compare-toolbar{
  display:flex;align-items:center;gap:12px;
  padding:12px 24px;
  background:var(--bg-surface);
  border-bottom:1px solid var(--border);
}
.btn-secondary{
  padding:8px 20px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text);
  font-size:.88rem;cursor:pointer;
  transition:all var(--transition);
}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.toolbar-spacer{flex:1}
.copy-toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:10px 24px;border-radius:var(--radius-sm);
  background:var(--success);color:#fff;font-size:.88rem;font-weight:600;
  opacity:0;pointer-events:none;
  transition:all .3s ease;z-index:999;
}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.compare-panels{
  display:grid;grid-template-columns:1fr 1fr;
  flex:1;overflow:hidden;
}
.panel{
  display:flex;flex-direction:column;
  overflow:hidden;
}
.panel-header{
  padding:10px 20px;
  font-size:.82rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-muted);
  border-bottom:1px solid var(--border);
  background:var(--bg-surface);
}
.panel-left{border-right:1px solid var(--border)}
.panel-left .panel-body{background:var(--bg-muted)}
.panel-body{
  flex:1;overflow-y:auto;
  padding:24px;
  font-size:.95rem;line-height:1.9;
  white-space:pre-wrap;word-wrap:break-word;
}
.panel-body:focus{outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px}

/* diff highlights */
.diff-del{
  background:var(--diff-del-bg);color:var(--diff-del-text);
  text-decoration:line-through;border-radius:3px;padding:0 2px;
}
.diff-ins{
  background:var(--diff-ins-bg);color:var(--diff-ins-text);
  border-radius:3px;padding:0 2px;
}

/* ─── Loading ─── */
.loading-overlay{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.loading-overlay.active{opacity:1;pointer-events:auto}
.spinner{
  width:40px;height:40px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:16px;color:#fff;font-size:.95rem}

/* ─── Error ─── */
.error-msg{
  margin-top:12px;padding:12px 16px;
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.3);
  border-radius:var(--radius-sm);
  color:var(--danger);font-size:.88rem;
  max-width:720px;width:100%;
}

/* ─── Responsive ─── */
@media(max-width:768px){
  .nav{padding:10px 16px;flex-wrap:wrap}
  .api-key-wrap{order:10;width:100%;margin-top:8px}
  .api-key-input{flex:1}
  .compare-panels{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  .panel-left{border-right:none;border-bottom:1px solid var(--border)}
  .input-screen{padding:32px 16px}
}
</style>
</head>

# 기자를 위한 기사 수정 가이드

> 이 가이드는 신문사 신입 기자들이 기사를 작성하고 수정할 때 참고할 수 있도록, 실제 언론 현장에서 발생한 수정 사례들을 체계적으로 정리한 것입니다. 각 사례에는 수정 전/후 비교와 수정 이유를 포함하여 왜 그렇게 고쳐야 하는지를 이해할 수 있게 했습니다.

---

## 제1장: 문장과 표현

기사의 기본 단위는 문장이다. 아무리 좋은 취재를 해도 문장이 정확하지 않으면 독자에게 제대로 전달되지 않는다. 이 장에서는 신입 기자가 가장 자주 범하는 문장 수준의 오류를 다룬다.

### 1.1 맞춤법과 띄어쓰기

기사의 신뢰는 맞춤법에서 시작된다. 맞춤법 오류가 있는 기사는 내용의 정확성까지 의심받는다.

#### 자주 틀리는 맞춤법

- 않된다 → 안 된다: '안'은 '아니'의 줄임말(부사). '않'은 '아니하'의 줄임말(보조 용언).
- 돼었다 → 되었다: '돼'는 '되어'의 줄임말. '되어었다'는 성립하지 않음.
- 들어나다 → 드러나다: '드러나다'가 표준 표기. '들어나다'는 존재하지 않는 단어.
- 어떻해 → 어떡해: '어떠하게 해'를 축약한 형태가 '어떡해'.
- 웬지 → 왠지: '왠지'는 '왜인지'의 준말. '웬'은 '어찌 된'이라는 다른 뜻.
- 촛점 → 초점: 사이시옷이 적용되지 않는 한자어 결합.
- 알맞는 → 알맞은: '알맞다'는 형용사이므로 관형사형은 '-은'. '-는'은 동사에 사용.
- 회계년도 → 회계연도: 표준어는 '연도'. '년도'는 비표준.

#### 자주 틀리는 띄어쓰기

- 첫번째 → 첫 번째: 관형사 + 의존명사는 띄어 쓴다.
- 다음주 → 다음 주: '다음'과 '주'는 별개의 단어.
- 이틀만에 → 이틀 만에: 시간 경과의 의존명사 '만'은 띄어 쓴다.
- 간지 5년 → 간 지 5년: 시간 경과의 의존명사 '지'는 앞말과 띄어 쓴다.
- 이틀 간의 → 이틀간의: 기간을 나타내는 '간'은 접미사이므로 붙여 쓴다.
- 기업간 경쟁 → 기업 간 경쟁: 관계를 나타내는 '간'은 의존명사이므로 띄어 쓴다.
- 이것 뿐이다 → 이것뿐이다: 명사 뒤의 '뿐'은 붙여 쓴다.

> **팁**: '만'과 '간'은 맥락에 따라 붙여 쓰기/띄어 쓰기가 달라진다.

#### 자주 틀리는 외래어 표기

- 컨텐츠 → 콘텐츠: 영어 'con-'은 '콘'으로 표기
- 메세지 → 메시지: 영어 [sɪdʒ]는 '시'에 가까움
- 악세사리 → 액세서리: 일본어식 발음 영향 배제
- 시물레이션 → 시뮬레이션: 영어 'si-mu-'는 '시뮬'이 표준

---

### 1.2 비문과 주술 호응

비문은 문법적으로 완결되지 않은 문장이다. 기사에서 가장 흔한 비문은 주술 호응 오류다.

- 사례: "기계를 이용할 때의 장점은 힘이 덜 든다." → "기계를 이용할 때의 장점은 힘이 덜 든다는 것이다."
- 사례: '이유는 ~때문이다' 호응, '접수하다'는 받는 쪽이 주어일 때 사용
- 원칙: 문장을 쓴 뒤 주어를 찾고, 서술어가 그 주어에 호응하는지 확인한다.

---

### 1.3 중복 표현과 군더더기

- 과반수 이상이 찬성 → 과반수가 찬성: '과반수'가 이미 '절반을 넘는 수'를 뜻함
- 옥상 위에서 → 옥상에서: '옥상'이 이미 건물 꼭대기
- 모든 사람들이 → 모든 사람이: '모든'이 이미 복수를 나타냄. '들' 남발은 번역체

---

### 1.4 번역체 표현

- ~에 있어 → 삭제 또는 조사로 대체
- ~로부터 받은 → ~에게서 받은
- ~에 대하여 → 조사('의', '을')로 대체
- ~에 의해 빌려졌다 → (능동문) 빌렸다
- ~의 경우 → ~은/는
- 한국의 경우, 출산율이 낮다 → 한국은 출산율이 낮다

---

### 1.5 피동/사동 오용

- 잊혀지다 → 잊히다: '-어지다' 중복
- 쓰여지다 → 쓰이다
- 작성되어졌다 → 작성되었다
- 불리우다 → 불리다
- 원칙: 피동 접미사가 붙은 단어에 다시 '-어지다'를 붙이지 않는다.

---

### 1.6 조사 오용

- 로서: 자격/신분/지위
- 로써: 수단/도구/방법
- '~에 대한' 남용 주의

---

## 제2장: 기사 구조와 형식

### 2.1 리드(첫 문단) 작성
- 리드는 60자 이내, 핵심 사실 포함
- 질문형, 추측형 지양
- 출처보다 뉴스가 먼저

### 2.2 역피라미드 구조
- 가장 중요한 사실을 맨 앞에 배치
- 리드 → 구체적 설명 → 배경/맥락 → 부가 정보

### 2.3 기사 제목
- 8~12자 내외, 구체적 사실 포함
- 낚시성, 모호, 과장, 피동형 제목 지양

### 2.4 인용문 처리
- 직접인용: 따옴표 + ~라고
- 간접인용: 따옴표 없이 + ~고
- 모호한 출처 사용 금지

### 2.5 단락 구성
- 한 단락에 하나의 주제
- 2~3문장이 적정

### 2.6 기사 유형별 구조
- 스트레이트: 기자 의견 삽입 금지
- 피처: 내러티브 활용
- 기획: 추세 분석, 전문가 견해 종합

### 2.7 사진 캡션
- 장소, 날짜, 행위 구체적 서술
- '~모습' 남발 금지

---

## 제3장: 정확성과 윤리

### 3.1 사실 확인
- 상관관계와 인과관계 혼동 금지
- 미확인 정보 보도 주의

### 3.2 수치와 통계
- 상대값과 절대값 함께 제시
- 비교 기준 통일
- 자의적 지표 조합 금지

### 3.3 출처 표기
- 타사 보도 인용 시 출처 명시

### 3.4 공정성과 균형
- 사실과 의견 분리
- 반론 포함

### 3.5 인권과 차별 표현
- 성차별: 여류 작가 → 작가, 여기자 → 기자
- 장애인: 장애우 → 장애인, 정신지체 → 지적장애
- 불법체류자 → 미등록 이주민

### 3.6 선정성 자제
- 성폭력 사건 선정적 묘사 금지
- 자살 보도: 구체적 방법 묘사 금지

## 부록: 자주 틀리는 표현 체크리스트

A. 맞춤법/표기: '안 되다' vs '않다', '되다/돼다', 외래어 표기법, 의존명사 띄어쓰기
B. 문장: 주술 호응, 이중 피동, 번역체, 중복 표현, '~에 따르면' 호응
C. 구조: 리드 60자 이내, 역피라미드, 제목, 인용, 출처, 단락
D. 정확성/윤리: 팩트체크, 통계, 사실/의견 분리, 반론, 차별 표현, 선정성`;

// ===== DOM =====
const apiKeyInput    = document.getElementById('apiKeyInput');
const apiKeyStatus   = document.getElementById('apiKeyStatus');
const themeToggle    = document.getElementById('themeToggle');
const inputScreen    = document.getElementById('inputScreen');
const compareScreen  = document.getElementById('compareScreen');
const articleInput   = document.getElementById('articleInput');
const charCount      = document.getElementById('charCount');
const proofreadBtn   = document.getElementById('proofreadBtn');
const errorContainer = document.getElementById('errorContainer');
const backBtn        = document.getElementById('backBtn');
const copyBtn        = document.getElementById('copyBtn');
const originalPanel  = document.getElementById('originalPanel');
const revisedPanel   = document.getElementById('revisedPanel');
const loadingOverlay = document.getElementById('loadingOverlay');
const copyToast      = document.getElementById('copyToast');

let originalText = '';

// ===== Theme =====
function initTheme(){
  const saved = localStorage.getItem('theme');
  if(saved === 'light') document.documentElement.setAttribute('data-theme','light');
  updateThemeIcon();
}
function updateThemeIcon(){
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  themeToggle.innerHTML = isLight ? '&#9790;' : '&#9788;';
}
themeToggle.addEventListener('click',()=>{
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if(isLight) document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme','light');
  localStorage.setItem('theme', isLight ? 'dark' : 'light');
  updateThemeIcon();
});
initTheme();

// ===== API Key =====
const savedKey = localStorage.getItem('anthropic_api_key');
if(savedKey){
  apiKeyInput.value = savedKey;
  apiKeyStatus.textContent = '저장됨';
  apiKeyStatus.style.color = 'var(--success)';
}
apiKeyInput.addEventListener('change',()=>{
  const key = apiKeyInput.value.trim();
  if(key){
    localStorage.setItem('anthropic_api_key', key);
    apiKeyStatus.textContent = '저장됨';
    apiKeyStatus.style.color = 'var(--success)';
  } else {
    localStorage.removeItem('anthropic_api_key');
    apiKeyStatus.textContent = '';
  }
});

// ===== Char Count =====
articleInput.addEventListener('input',()=>{
  charCount.textContent = articleInput.value.length + '자';
});

// ===== Screen Switching =====
function showScreen(screen){
  inputScreen.classList.remove('active');
  compareScreen.classList.remove('active');
  screen.classList.add('active');
}

backBtn.addEventListener('click',()=>{
  showScreen(inputScreen);
  articleInput.value = originalText;
  charCount.textContent = originalText.length + '자';
});

// ===== Copy =====
copyBtn.addEventListener('click',()=>{
  const text = revisedPanel.innerText;
  navigator.clipboard.writeText(text).then(()=>{
    copyToast.classList.add('show');
    setTimeout(()=> copyToast.classList.remove('show'), 2000);
  });
});

// ===== Diff Algorithm (word-level LCS) =====
function diffWords(oldText, newText){
  const oldTokens = oldText.split(/(\s+)/);
  const newTokens = newText.split(/(\s+)/);
  const m = oldTokens.length;
  const n = newTokens.length;

  // Build LCS table
  const dp = [];
  for(let i = 0; i <= m; i++){
    dp[i] = new Uint16Array(n + 1);
  }
  for(let i = 1; i <= m; i++){
    for(let j = 1; j <= n; j++){
      if(oldTokens[i-1] === newTokens[j-1]){
        dp[i][j] = dp[i-1][j-1] + 1;
      } else {
        dp[i][j] = dp[i-1][j] > dp[i][j-1] ? dp[i-1][j] : dp[i][j-1];
      }
    }
  }

  // Backtrack
  const result = [];
  let i = m, j = n;
  while(i > 0 || j > 0){
    if(i > 0 && j > 0 && oldTokens[i-1] === newTokens[j-1]){
      result.push({type:'equal', value: oldTokens[i-1]});
      i--; j--;
    } else if(j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])){
      result.push({type:'insert', value: newTokens[j-1]});
      j--;
    } else {
      result.push({type:'delete', value: oldTokens[i-1]});
      i--;
    }
  }
  result.reverse();
  return result;
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderDiff(diff, side){
  let html = '';
  for(const d of diff){
    const val = escapeHtml(d.value);
    if(d.type === 'equal'){
      html += val;
    } else if(d.type === 'delete'){
      if(side === 'left') html += '<span class="diff-del">' + val + '</span>';
      // skip deletes on right side
    } else if(d.type === 'insert'){
      if(side === 'right') html += '<span class="diff-ins">' + val + '</span>';
      // skip inserts on left side
    }
  }
  return html;
}

// ===== Show Error =====
function showError(msg){
  errorContainer.innerHTML = '<div class="error-msg">' + escapeHtml(msg) + '</div>';
}
function clearError(){
  errorContainer.innerHTML = '';
}

// ===== API Call =====
async function proofread(text){
  const apiKey = localStorage.getItem('anthropic_api_key');
  if(!apiKey){
    showError('API 키를 입력해주세요. 상단에 Anthropic API Key를 입력하세요.');
    return null;
  }

  loadingOverlay.classList.add('active');
  clearError();

  const controller = new AbortController();
  const timeoutId = setTimeout(()=> controller.abort(), 90000);

  try{
    const response = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      signal: controller.signal,
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens: 8192,
        system: AI_SYSTEM_PROMPT,
        messages:[{
          role:'user',
          content:'다음 기사를 교정해주세요:\n\n' + text
        }]
      })
    });

    clearTimeout(timeoutId);

    if(!response.ok){
      const status = response.status;
      if(status === 401) throw new Error('API 키가 올바르지 않습니다. Anthropic API 키를 확인해주세요.');
      if(status === 403) throw new Error('API 접근 권한이 없습니다. API 키 설정을 확인해주세요.');
      if(status === 429) throw new Error('요청 제한에 도달했습니다. 잠시 후 다시 시도해 주세요.');
      if(status >= 500) throw new Error('AI 서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
      const errData = await response.json().catch(()=>({}));
      throw new Error(errData.error?.message || 'API 요청 실패 (HTTP ' + status + ')');
    }

    const data = await response.json();
    const aiText = data.content && data.content[0] && data.content[0].text;
    if(!aiText) throw new Error('AI로부터 유효한 응답을 받지 못했습니다.');

    return aiText;

  } catch(err){
    if(err.name === 'AbortError'){
      showError('AI 응답 시간이 초과되었습니다.');
    } else if(err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('network')){
      showError('네트워크 연결을 확인해주세요.');
    } else {
      showError(err.message || 'AI 교정 중 오류가 발생했습니다.');
    }
    return null;
  } finally {
    clearTimeout(timeoutId);
    loadingOverlay.classList.remove('active');
  }
}

// ===== Main Action =====
proofreadBtn.addEventListener('click', async ()=>{
  const text = articleInput.value.trim();
  if(!text){
    showError('기사 내용을 입력해주세요.');
    return;
  }
  clearError();
  proofreadBtn.disabled = true;

  const revised = await proofread(text);

  proofreadBtn.disabled = false;

  if(revised === null) return;

  originalText = text;

  // Compute diff
  const diff = diffWords(text, revised);

  // Render panels
  originalPanel.innerHTML = renderDiff(diff, 'left');
  revisedPanel.innerHTML  = renderDiff(diff, 'right');

  showScreen(compareScreen);
});

})();
</script>
</body>
