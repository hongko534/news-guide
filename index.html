<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 에디터 - 기사 수정 도우미</title>
<style>
/* ===== CSS Variables / Theme ===== */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow: 0 2px 12px rgba(0,0,0,0.15);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.25);
}

[data-theme="dark"] {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-tertiary: #242836;
  --bg-hover: #2a2f3e;
  --text-primary: #e8eaf0;
  --text-secondary: #9ca3b4;
  --text-muted: #636b7e;
  --border: #2e3346;
  --border-focus: #5b6abf;
  --accent: #6c7ae0;
  --accent-hover: #8490f0;
  --accent-glow: rgba(108, 122, 224, 0.15);
  --error: #f5555d;
  --error-bg: rgba(245, 85, 93, 0.12);
  --warning: #f0b052;
  --warning-bg: rgba(240, 176, 82, 0.12);
  --info: #4dacf0;
  --info-bg: rgba(77, 172, 240, 0.12);
  --success: #4dd68e;
  --success-bg: rgba(77, 214, 142, 0.12);
  --diff-add-bg: rgba(77, 214, 142, 0.15);
  --diff-add-text: #6ee7a0;
  --diff-del-bg: rgba(245, 85, 93, 0.15);
  --diff-del-text: #ff8a8e;
  --score-ring-bg: #2e3346;
}

[data-theme="light"] {
  --bg-primary: #f5f6fa;
  --bg-secondary: #ffffff;
  --bg-tertiary: #eef0f6;
  --bg-hover: #e4e7f0;
  --text-primary: #1a1d27;
  --text-secondary: #5a6175;
  --text-muted: #8a92a6;
  --border: #d8dce8;
  --border-focus: #5b6abf;
  --accent: #5b6abf;
  --accent-hover: #4a58a8;
  --accent-glow: rgba(91, 106, 191, 0.12);
  --error: #dc3545;
  --error-bg: rgba(220, 53, 69, 0.08);
  --warning: #d4940a;
  --warning-bg: rgba(212, 148, 10, 0.08);
  --info: #2b8ad4;
  --info-bg: rgba(43, 138, 212, 0.08);
  --success: #28a060;
  --success-bg: rgba(40, 160, 96, 0.08);
  --diff-add-bg: rgba(40, 160, 96, 0.12);
  --diff-add-text: #1a7a45;
  --diff-del-bg: rgba(220, 53, 69, 0.12);
  --diff-del-text: #b32030;
  --score-ring-bg: #d8dce8;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
}

/* ===== Header ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background var(--transition), border-color var(--transition);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 18px;
}

.logo-text {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.logo-sub {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 16px;
}

/* Score Display */
.score-display {
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transform: scale(0.9);
  transition: opacity var(--transition), transform var(--transition);
}

.score-display.visible {
  opacity: 1;
  transform: scale(1);
}

.score-ring {
  position: relative;
  width: 44px;
  height: 44px;
}

.score-ring svg {
  transform: rotate(-90deg);
  width: 44px;
  height: 44px;
}

.score-ring .ring-bg {
  fill: none;
  stroke: var(--score-ring-bg);
  stroke-width: 4;
}

.score-ring .ring-fg {
  fill: none;
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease, stroke 0.5s ease;
}

.score-value {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}

.score-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}

/* Theme Toggle */
.theme-toggle {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: background var(--transition), border-color var(--transition);
}

.theme-toggle::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  transition: transform var(--transition);
}

[data-theme="light"] .theme-toggle::after {
  transform: translateX(20px);
}

.theme-toggle-label {
  font-size: 12px;
  color: var(--text-muted);
}

/* ===== Main Layout ===== */
.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  height: calc(100vh - 73px);
}

/* ===== Editor Panel ===== */
.editor-panel {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  transition: border-color var(--transition);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  transition: border-color var(--transition);
}

.panel-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-secondary);
}

.char-count {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.editor-area {
  flex: 1;
  position: relative;
}

#articleInput {
  width: 100%;
  height: 100%;
  padding: 20px;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.8;
  resize: none;
  outline: none;
  transition: color var(--transition);
}

#articleInput::placeholder {
  color: var(--text-muted);
}

.editor-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  transition: border-color var(--transition);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: var(--font-sans);
  cursor: pointer;
  border: none;
  transition: all var(--transition);
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px var(--accent-glow);
}

.btn-primary:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 16px var(--accent-glow);
  transform: translateY(-1px);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ===== Results Panel ===== */
.results-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.results-content {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.results-content::-webkit-scrollbar {
  width: 6px;
}

.results-content::-webkit-scrollbar-track {
  background: transparent;
}

.results-content::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

/* Empty State */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px;
  text-align: center;
}

.empty-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  font-size: 28px;
}

.empty-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}

.empty-desc {
  font-size: 13px;
  color: var(--text-muted);
  max-width: 280px;
  line-height: 1.6;
}

/* Loading State */
.loading-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px;
  text-align: center;
}

.loading-state.active {
  display: flex;
}

.loading-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 14px;
  color: var(--text-secondary);
}

.loading-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Category Filters */
.filter-bar {
  display: none;
  gap: 6px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  transition: border-color var(--transition);
}

.filter-bar.visible {
  display: flex;
}

.filter-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  transition: all var(--transition);
}

.filter-btn:hover {
  background: var(--bg-hover);
}

.filter-btn.active {
  border-color: var(--accent);
  background: var(--accent-glow);
  color: var(--accent);
}

.filter-count {
  background: var(--bg-hover);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 11px;
  font-family: var(--font-mono);
}

.filter-btn.active .filter-count {
  background: var(--accent);
  color: #fff;
}

/* Stats Summary */
.stats-summary {
  display: none;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  transition: border-color var(--transition);
}

.stats-summary.visible {
  display: block;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.stat-card {
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  text-align: center;
}

.stat-card.spelling { background: var(--error-bg); }
.stat-card.expression { background: var(--warning-bg); }
.stat-card.structure { background: var(--info-bg); }
.stat-card.ethics { background: var(--success-bg); }

.stat-value {
  font-size: 22px;
  font-weight: 700;
  font-family: var(--font-mono);
}

.stat-card.spelling .stat-value { color: var(--error); }
.stat-card.expression .stat-value { color: var(--warning); }
.stat-card.structure .stat-value { color: var(--info); }
.stat-card.ethics .stat-value { color: var(--success); }

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Correction Items */
.corrections-list {
  padding: 12px 20px 20px;
}

.correction-item {
  padding: 16px;
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  transition: all var(--transition);
  animation: fadeSlideIn 0.3s ease both;
}

.correction-item:hover {
  border-color: var(--border-focus);
  box-shadow: 0 2px 8px var(--accent-glow);
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.correction-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.correction-badges {
  display: flex;
  align-items: center;
  gap: 6px;
}

.badge {
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.badge-spelling { background: var(--error-bg); color: var(--error); }
.badge-expression { background: var(--warning-bg); color: var(--warning); }
.badge-structure { background: var(--info-bg); color: var(--info); }
.badge-ethics { background: var(--success-bg); color: var(--success); }

.severity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.severity-error { background: var(--error); box-shadow: 0 0 6px var(--error-bg); }
.severity-warning { background: var(--warning); box-shadow: 0 0 6px var(--warning-bg); }
.severity-info { background: var(--info); box-shadow: 0 0 6px var(--info-bg); }

.correction-diff {
  margin-bottom: 10px;
  font-size: 14px;
  line-height: 1.7;
}

.diff-del {
  background: var(--diff-del-bg);
  color: var(--diff-del-text);
  padding: 2px 4px;
  border-radius: 3px;
  text-decoration: line-through;
}

.diff-add {
  background: var(--diff-add-bg);
  color: var(--diff-add-text);
  padding: 2px 4px;
  border-radius: 3px;
}

.diff-arrow {
  margin: 0 6px;
  color: var(--text-muted);
  font-size: 12px;
}

.diff-manual {
  background: var(--warning-bg);
  color: var(--warning);
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 12px;
  font-weight: 600;
  border: 1px dashed var(--warning);
}

.correction-reason {
  font-size: 13px;
  color: var(--text-secondary);
  padding-left: 12px;
  border-left: 2px solid var(--border);
  line-height: 1.6;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .main {
    grid-template-columns: 1fr;
    height: auto;
  }

  .editor-panel {
    border-right: none;
    border-bottom: 1px solid var(--border);
    min-height: 40vh;
  }

  .results-panel {
    min-height: 50vh;
  }

  .header {
    padding: 12px 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .header-actions {
    flex-wrap: wrap;
    gap: 8px;
  }

  .api-key-area input {
    width: 140px !important;
  }

  .logo-text {
    font-size: 17px;
  }

  .logo-sub {
    display: none;
  }

  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .score-label {
    display: none;
  }
}

@media (max-width: 480px) {
  .stats-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .filter-bar {
    padding: 10px 14px;
  }
}

/* ===== Utility ===== */
.hidden { display: none !important; }

/* Error message */
.error-message {
  display: none;
  padding: 12px 20px;
  margin: 12px 20px;
  border-radius: var(--radius-sm);
  background: var(--error-bg);
  color: var(--error);
  font-size: 13px;
  border: 1px solid rgba(245, 85, 93, 0.2);
}

.error-message.visible {
  display: block;
}

/* Pulse animation for analyze button */
@keyframes pulse {
  0%, 100% { box-shadow: 0 2px 8px var(--accent-glow); }
  50% { box-shadow: 0 4px 20px var(--accent-glow); }
}

.btn-primary.pulse {
  animation: pulse 2s ease infinite;
}

/* ===== AI Proofread Button ===== */
.btn-ai {
  background: linear-gradient(135deg, #8b5cf6, #6c7ae0, #4dacf0);
  color: #fff;
  box-shadow: 0 2px 12px rgba(139, 92, 246, 0.3);
  position: relative;
  overflow: hidden;
}

.btn-ai::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
  animation: aiShimmer 3s ease infinite;
}

@keyframes aiShimmer {
  0% { transform: translateX(-100%) rotate(45deg); }
  100% { transform: translateX(100%) rotate(45deg); }
}

.btn-ai:hover {
  background: linear-gradient(135deg, #9b6ff6, #7c8af0, #5dbcff);
  box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
  transform: translateY(-1px);
}

.btn-ai:active {
  transform: translateY(0);
}

.btn-ai:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-ai:disabled::before {
  animation: none;
}

/* AI Loading State */
.ai-loading-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 40px;
  text-align: center;
}

.ai-loading-state.active {
  display: flex;
}

.ai-loading-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-radius: 50%;
  margin-bottom: 20px;
  position: relative;
  animation: aiPulseRing 1.5s ease infinite;
}

.ai-loading-spinner::before,
.ai-loading-spinner::after {
  content: '';
  position: absolute;
  border-radius: 50%;
}

.ai-loading-spinner::before {
  inset: 3px;
  border: 2px solid transparent;
  border-top-color: #8b5cf6;
  border-right-color: #6c7ae0;
  animation: spin 0.8s linear infinite;
}

.ai-loading-spinner::after {
  inset: 8px;
  border: 2px solid transparent;
  border-bottom-color: #4dacf0;
  animation: spin 1.2s linear infinite reverse;
}

@keyframes aiPulseRing {
  0%, 100% { border-color: var(--border); }
  50% { border-color: rgba(139, 92, 246, 0.3); }
}

.ai-loading-text {
  font-size: 14px;
  color: var(--text-secondary);
  background: linear-gradient(90deg, #8b5cf6, #6c7ae0, #4dacf0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 600;
}

.ai-loading-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* AI Result Styles */
.ai-result-container {
  padding: 20px;
}

.ai-result-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.ai-result-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(108,122,224,0.15));
  color: #8b5cf6;
  border: 1px solid rgba(139,92,246,0.2);
}

[data-theme="light"] .ai-result-badge {
  color: #7c3aed;
  background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(108,122,224,0.1));
}

.ai-result-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
}

.ai-result-body {
  font-size: 14px;
  line-height: 1.85;
  color: var(--text-primary);
}

.ai-result-body h1,
.ai-result-body h2,
.ai-result-body h3,
.ai-result-body h4 {
  margin-top: 20px;
  margin-bottom: 10px;
  color: var(--text-primary);
  font-weight: 700;
}

.ai-result-body h1 { font-size: 20px; }
.ai-result-body h2 { font-size: 17px; }
.ai-result-body h3 { font-size: 15px; }
.ai-result-body h4 { font-size: 14px; }

.ai-result-body p {
  margin-bottom: 10px;
}

.ai-result-body strong {
  color: var(--accent);
  font-weight: 700;
}

.ai-result-body ul,
.ai-result-body ol {
  margin: 8px 0 12px 20px;
}

.ai-result-body li {
  margin-bottom: 6px;
  line-height: 1.7;
}

.ai-result-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}

.ai-result-body code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
}

.ai-result-body blockquote {

</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">N</div>
    <div>
      <div class="logo-text">뉴스 에디터</div>
      <div class="logo-sub">기사 수정 도우미</div>
    </div>
  </div>

        <div class="score-value" id="scoreValue">—</div>
      </div>
      <span class="score-label">기사 점수</span>

    <div class="api-key-area" style="display:flex;align-items:center;gap:8px;">

        <input type="password" id="apiKeyInput" placeholder="Anthropic API Key"
          style="background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);
          color:var(--text-primary);padding:6px 32px 6px 10px;font-size:12px;width:180px;
          transition:border-color var(--transition);outline:none;"
          onfocus="this.style.borderColor='var(--border-focus)'"
          onblur="this.style.borderColor='var(--border)'">
        <button id="apiKeyToggle" type="button" title="키 표시/숨김"
          style="position:absolute;right:6px;background:none;border:none;color:var(--text-muted);
          cursor:pointer;padding:2px;font-size:14px;line-height:1;">&#128065;</button>
      </div>
      <span id="apiKeyStatus" style="font-size:11px;color:var(--text-muted);white-space:nowrap;"></span>

    <div style="display:flex;align-items:center;gap:8px;">
      <span class="theme-toggle-label">&#9790;</span>

      <span class="theme-toggle-label">&#9788;</span>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="main">
  <!-- Editor Panel -->
  <section class="editor-panel">
    <div class="panel-header">
      <span class="panel-title">기사 입력</span>
      <span class="char-count" id="charCount">0자</span>
    </div>
    <div class="editor-area">
      <textarea id="articleInput" placeholder="여기에 기사를 입력하세요...

예시:
서울시는 오늘 새로운 교통 정책을 발표했다. 이번 정책은 시민들의 교통 편의를 높이기 위해 마련됐으며, 전문가들은 긍정적인 반응을 보이고 있다.

기자가 작성한 기사를 붙여넣으면 맞춤법, 표현, 구조, 언론 윤리 등을 종합적으로 분석합니다."></textarea>
    </div>
    <div class="editor-footer">
      <button class="btn btn-secondary" id="clearBtn" type="button">지우기</button>
      <button class="btn btn-ai pulse" id="analyzeBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M12.5 3.5l-1.4 1.4M4.9 11.1l-1.4 1.4"/>
          <circle cx="8" cy="8" r="2.5" fill="currentColor" opacity="0.3"/>
        </svg>
        AI 교정
      </button>
    </div>
  </section>

  <!-- Results Panel -->
  <section class="results-panel">
    <div class="panel-header">
      <span class="panel-title">분석 결과</span>
      <span class="char-count" id="issueCount"></span>
    </div>

    <!-- Category Filters -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-category="all">
        전체 <span class="filter-count" id="countAll">0</span>
      </button>
      <button class="filter-btn" data-category="spelling">
        맞춤법 <span class="filter-count" id="countSpelling">0</span>
      </button>
      <button class="filter-btn" data-category="expression">
        표현 <span class="filter-count" id="countExpression">0</span>
      </button>
      <button class="filter-btn" data-category="structure">
        구조 <span class="filter-count" id="countStructure">0</span>
      </button>
      <button class="filter-btn" data-category="ethics">
        윤리 <span class="filter-count" id="countEthics">0</span>
      </button>
    </div>

    <!-- Stats Summary -->
    <div class="stats-summary" id="statsSummary">
      <div class="stats-grid">
        <div class="stat-card spelling">
          <div class="stat-value" id="statSpelling">0</div>
          <div class="stat-label">맞춤법</div>
        </div>
        <div class="stat-card expression">
          <div class="stat-value" id="statExpression">0</div>
          <div class="stat-label">표현</div>
        </div>
        <div class="stat-card structure">
          <div class="stat-value" id="statStructure">0</div>
          <div class="stat-label">구조</div>
        </div>
        <div class="stat-card ethics">
          <div class="stat-value" id="statEthics">0</div>
          <div class="stat-label">윤리</div>
        </div>
      </div>
    </div>

    <!-- Error Message -->
    <div class="error-message" id="errorMessage"></div>

    <!-- Results Content -->
    <div class="results-content" id="resultsContent">
      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">&#9998;</div>
        <div class="empty-title">분석 대기 중</div>
        <div class="empty-desc">좌측에 기사를 입력하고 "AI 교정" 버튼을 클릭하면 규칙 기반 분석과 AI 교정을 동시에 수행합니다.</div>
      </div>

      <!-- Loading State -->
      <div class="loading-state" id="loadingState">
        <div class="loading-spinner"></div>
        <div class="loading-text">기사를 분석하고 있습니다</div>
        <div class="loading-sub">잠시만 기다려 주세요...</div>
      </div>

      <!-- AI Loading State -->
      <div class="ai-loading-state" id="aiLoadingState">
        <div class="ai-loading-spinner"></div>
        <div class="ai-loading-text">AI가 기사를 분석하고 있습니다</div>
        <div class="ai-loading-sub">Claude가 교정 중입니다... 잠시만 기다려 주세요.</div>
      </div>

      <!-- Corrections List -->
      <div class="corrections-list hidden" id="correctionsList"></div>
    </div>
  </section>
</main>

<script>
// ===== 기사 분석 엔진 — 신입기자 기사수정 가이드 기반 =====
// 카테고리: spelling (맞춤법/표기), expression (표현/문체), structure (구조), ethics (정확성/윤리)

const _engineRules = [
  // ============================================================
  // 1. 맞춤법/표기 (spelling)
  // ============================================================

  // 1-1. 자주 틀리는 맞춤법
  { pattern: /않된다/g, replacement: '안 된다', category: 'spelling', reason: "'안'은 부사('아니'의 줄임), '않'은 보조 용언('아니하'의 줄임)입니다.", severity: 'error' },
  { pattern: /않되/g, replacement: '안 되', category: 'spelling', reason: "'안'은 부사('아니'의 줄임), '않'은 보조 용언('아니하'의 줄임)입니다.", severity: 'error' },
  { pattern: /돼었/g, replacement: '되었', category: 'spelling', reason: "'돼'는 '되어'의 줄임말입니다. '되어었다'는 성립하지 않습니다.", severity: 'error' },
  { pattern: /들어나/g, replacement: '드러나', category: 'spelling', reason: "'드러나다'가 표준 표기입니다. '들어나다'는 존재하지 않는 단어입니다.", severity: 'error' },
  { pattern: /어떻해/g, replacement: '어떡해', category: 'spelling', reason: "'어떠하게 해'를 축약한 형태가 '어떡해'입니다.", severity: 'error' },
  { pattern: /웬지/g, replacement: '왠지', category: 'spelling', reason: "'왠지'는 '왜인지'의 준말입니다. '웬'은 '어찌 된'이라는 다른 뜻입니다.", severity: 'error' },
  { pattern: /촛점/g, replacement: '초점', category: 'spelling', reason: "사이시옷이 적용되지 않는 한자어 결합입니다.", severity: 'error' },
  { pattern: /알맞는/g, replacement: '알맞은', category: 'spelling', reason: "'알맞다'는 형용사이므로 관형사형은 '-은'입니다.", severity: 'error' },
  { pattern: /회계년도/g, replacement: '회계연도', category: 'spelling', reason: "표준어는 '연도'입니다. '년도'는 비표준입니다.", severity: 'error' },
  { pattern: /어의없/g, replacement: '어이없', category: 'spelling', reason: "'어이없다'가 표준어입니다. '어의(御醫)'는 다른 단어입니다.", severity: 'error' },
  { pattern: /모자른/g, replacement: '모자란', category: 'spelling', reason: "기본형이 '모자라다'이므로 '모자란'이 올바릅니다.", severity: 'error' },
  { pattern: /담배를 피다/g, replacement: '담배를 피우다', category: 'spelling', reason: "'피다'는 자동사, '피우다'는 타동사입니다. 목적어가 있으므로 '피우다'를 씁니다.", severity: 'error' },

  // 1-2. 외래어 표기
  { pattern: /컨텐츠/g, replacement: '콘텐츠', category: 'spelling', reason: "영어 'con-'은 '콘'으로 표기합니다 (국립국어원 외래어 표기법).", severity: 'error' },
  { pattern: /메세지/g, replacement: '메시지', category: 'spelling', reason: "영어 [sɪdʒ]는 '시'에 가깝습니다 (외래어 표기법).", severity: 'error' },
  { pattern: /악세사리/g, replacement: '액세서리', category: 'spelling', reason: "일본어식 발음 영향을 배제한 표준 표기입니다.", severity: 'error' },
  { pattern: /시물레이션/g, replacement: '시뮬레이션', category: 'spelling', reason: "영어 'si-mu-'는 '시뮬'이 표준입니다.", severity: 'error' },

  // 1-3. 띄어쓰기
  { pattern: /첫번째/g, replacement: '첫 번째', category: 'spelling', reason: "관형사 + 의존명사는 띄어 씁니다.", severity: 'error' },
  { pattern: /두번째/g, replacement: '두 번째', category: 'spelling', reason: "관형사 + 의존명사는 띄어 씁니다.", severity: 'error' },
  { pattern: /세번째/g, replacement: '세 번째', category: 'spelling', reason: "관형사 + 의존명사는 띄어 씁니다.", severity: 'error' },
  { pattern: /다음주/g, replacement: '다음 주', category: 'spelling', reason: "'다음'과 '주'는 별개의 단어입니다.", severity: 'error' },
  { pattern: /다음달/g, replacement: '다음 달', category: 'spelling', reason: "'다음'과 '달'은 별개의 단어입니다.", severity: 'error' },
  { pattern: /이틀만에/g, replacement: '이틀 만에', category: 'spelling', reason: "시간 경과의 의존명사 '만'은 띄어 씁니다.", severity: 'error' },
  { pattern: /(\d+일)만에/g, replacement: '$1 만에', category: 'spelling', reason: "시간 경과의 의존명사 '만'은 띄어 씁니다.", severity: 'error' },

  // 1-4. 유사어 혼동
  { pattern: /입맛이 땡/g, replacement: '입맛이 당', category: 'spelling', reason: "'당기다'가 표준어입니다. '땡기다'는 비표준입니다.", severity: 'error' },

  // ============================================================
  // 2. 표현/문체 (expression)
  // ============================================================

  // 2-1. 번역체 표현
  { pattern: /에 있어서?\b/g, replacement: '', category: 'expression', reason: "번역체 표현입니다. 삭제하거나 적절한 조사로 대체하세요. (영어 'in ~ing' / 일본어 '~において' 직역)", severity: 'warning', noAutoReplace: true },
  { pattern: /으?로부터 /g, replacement: '에게서 ', category: 'expression', reason: "'~로부터'는 영어 'from'의 직역입니다. '~에게서'가 자연스럽습니다.", severity: 'warning' },
  { pattern: /에 대하여/g, replacement: '을', category: 'expression', reason: "'~에 대하여'는 영어 'about'의 직역입니다. 조사로 대체하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /에 대한 /g, replacement: '', category: 'expression', reason: "'~에 대한'은 번역체입니다. 조사 '의' 또는 직접 연결로 대체하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /에 의해 /g, replacement: '', category: 'expression', reason: "'~에 의해'는 영어 수동태 직역입니다. 능동문으로 전환하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /의 경우[,\s]/g, replacement: '', category: 'expression', reason: "'~의 경우'는 영어 'in the case of' 직역입니다. '~은/는'으로 대체하세요.", severity: 'warning', noAutoReplace: true },

  // 2-2. 이중 피동
  { pattern: /잊혀지/g, replacement: '잊히', category: 'expression', reason: "이중 피동입니다. '잊다→잊히다'가 올바른 피동형입니다.", severity: 'error' },
  { pattern: /쓰여지/g, replacement: '쓰이', category: 'expression', reason: "이중 피동입니다. '쓰다→쓰이다'가 올바른 피동형입니다.", severity: 'error' },
  { pattern: /작성되어지/g, replacement: '작성되', category: 'expression', reason: "이중 피동입니다. '-되다'에 '-어지다'가 중복되었습니다.", severity: 'error' },
  { pattern: /불리우/g, replacement: '불리', category: 'expression', reason: "이중 피동입니다. '부르다→불리다'가 올바른 형태입니다.", severity: 'error' },
  { pattern: /만들어지/g, replacement: '만들', category: 'expression', reason: "이중 피동입니다. 능동문으로 전환하는 것을 권장합니다.", severity: 'info', noAutoReplace: true },

  // 2-3. 불필요한 사동 '-시키다'
  { pattern: /입금시키/g, replacement: '입금하', category: 'expression', reason: "과도한 사동 표현입니다. '-하다'로 충분합니다.", severity: 'warning' },
  { pattern: /활성화시키/g, replacement: '활성화하', category: 'expression', reason: "과도한 사동 표현입니다. '-하다'로 충분합니다.", severity: 'warning' },
  { pattern: /소개시켜/g, replacement: '소개해', category: 'expression', reason: "과도한 사동 표현입니다. '-하다'로 충분합니다.", severity: 'warning' },
  { pattern: /감소시키/g, replacement: '줄이', category: 'expression', reason: "과도한 사동 표현입니다. '줄이다'가 자연스럽습니다.", severity: 'warning' },
  { pattern: /증가시키/g, replacement: '늘리', category: 'expression', reason: "과도한 사동 표현입니다. '늘리다'가 자연스럽습니다.", severity: 'warning' },
  { pattern: /변화시키/g, replacement: '바꾸', category: 'expression', reason: "과도한 사동 표현입니다. '바꾸다'가 자연스럽습니다.", severity: 'warning' },

  // 2-4. 중복 표현
  { pattern: /과반수 이상/g, replacement: '과반수', category: 'expression', reason: "'과반수'가 이미 '절반을 넘는 수'를 뜻하므로 '이상'은 중복입니다.", severity: 'warning' },
  { pattern: /옥상 위에서/g, replacement: '옥상에서', category: 'expression', reason: "'옥상'이 이미 건물 꼭대기를 뜻하므로 '위에서'는 중복입니다.", severity: 'warning' },
  { pattern: /처음 첫/g, replacement: '첫', category: 'expression', reason: "'처음'과 '첫'은 같은 의미이므로 중복입니다.", severity: 'warning' },
  { pattern: /역전앞/g, replacement: '역 앞', category: 'expression', reason: "'역전(驛前)'이 이미 '역 앞'의 뜻이므로 중복입니다.", severity: 'warning' },
  { pattern: /거의 대부분/g, replacement: '대부분', category: 'expression', reason: "'거의'와 '대부분'은 의미가 중복됩니다.", severity: 'warning' },
  { pattern: /모든 사람들/g, replacement: '모든 사람', category: 'expression', reason: "'모든'이 이미 복수를 나타내므로 '들'은 불필요합니다.", severity: 'warning' },

  // 2-5. 진행형 남용
  { pattern: /하고 있는 중이/g, replacement: '하고 있', category: 'expression', reason: "'~하고 있는 중'은 이중 진행 표현입니다.", severity: 'warning' },

  // ============================================================
  // 3. 정확성/윤리 (ethics)
  // ============================================================

  // 3-1. 차별 표현 — 성차별
  { pattern: /여류 /g, replacement: '', category: 'ethics', reason: "'여류'는 남성형을 기본으로 여성형을 파생시킨 성차별 표현입니다. 성별 구분 없이 직함만 쓰세요.", severity: 'error', noAutoReplace: true },
  { pattern: /여기자/g, replacement: '기자', category: 'ethics', reason: "'여기자'는 '기자는 남자'라는 전제를 내포한 성차별 표현입니다.", severity: 'warning' },
  { pattern: /미망인/g, replacement: '배우자', category: 'ethics', reason: "'미망인(未亡人)'은 '아직 죽지 못한 사람'이라는 뜻으로 차별적 표현입니다.", severity: 'error' },

  // 3-2. 차별 표현 — 장애인
  { pattern: /장애우/g, replacement: '장애인', category: 'ethics', reason: "'장애우'는 비장애인 입장에서 타자화하는 동정적 표현입니다.", severity: 'error' },
  { pattern: /정신지체/g, replacement: '지적장애', category: 'ethics', reason: "2008년 법 개정으로 '지적장애'로 용어가 변경되었습니다.", severity: 'error' },
  { pattern: /눈먼 돈/g, replacement: '주인 없는 돈', category: 'ethics', reason: "시각장애를 비하하는 표현입니다.", severity: 'error' },
  { pattern: /절름발이/g, replacement: '불완전한', category: 'ethics', reason: "지체장애를 비하하는 표현입니다.", severity: 'error' },
  { pattern: /장애를 앓/g, replacement: '장애가 있', category: 'ethics', reason: "장애는 질병이 아닙니다. '앓다' 대신 '있다'를 사용하세요.", severity: 'error' },
  { pattern: /결정 장애/g, replacement: '우유부단', category: 'ethics', reason: "장애를 부정적 비유로 사용하는 표현입니다.", severity: 'warning' },

  // 3-3. 차별 표현 — 이주민
  { pattern: /불법체류자/g, replacement: '미등록 이주민', category: 'ethics', reason: "'불법'이 인간 자체를 규정하는 차별적 표현입니다.", severity: 'error' },

  // 3-4. 선정적/과장 표현
  { pattern: /충격[!！\s,]/g, replacement: '', category: 'ethics', reason: "'충격'은 근거 없는 감정적·선정적 표현입니다. 구체적 사실로 대체하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /역대급/g, replacement: '', category: 'ethics', reason: "'역대급'은 과장 표현입니다. 구체적 수치로 대체하세요.", severity: 'warning', noAutoReplace: true },
  { pattern: /경악/g, replacement: '', category: 'ethics', reason: "'경악'은 선정적 표현입니다. 객관적 서술로 대체하세요.", severity: 'warning', noAutoReplace: true },

  // 3-5. 모호한 출처
  { pattern: /업계에서는/g, replacement: '', category: 'ethics', reason: "모호한 출처입니다. 구체적 인물명, 직책, 소속을 밝히세요.", severity: 'info', noAutoReplace: true },
  { pattern: /전문가들은/g, replacement: '', category: 'ethics', reason: "모호한 출처입니다. 구체적 전문가의 이름과 소속을 밝히세요.", severity: 'info', noAutoReplace: true },
  { pattern: /관계자에 따르면/g, replacement: '', category: 'ethics', reason: "모호한 출처입니다. 구체적 인물명과 직책을 밝히세요.", severity: 'info', noAutoReplace: true },
];

// ===== 구조 분석 =====
function _checkStructure(text) {
  const corrections = [];
  const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);

  // 리드(첫 문장) 길이 체크
  if (paragraphs.length > 0) {
    const firstParagraph = paragraphs[0].trim();
    const firstSentenceMatch = firstParagraph.match(/^[^.!?。]*[.!?。]/);
    const firstSentence = firstSentenceMatch ? firstSentenceMatch[0] : firstParagraph;
    const cleanLen = firstSentence.replace(/\s+/g, '').length;

    if (cleanLen > 60) {
      corrections.push({
        category: 'structure',
        original: firstSentence.substring(0, 50) + '...',
        suggested: '리드를 60자 이내로 줄이세요',
        reason: '리드(첫 문장)가 ' + cleanLen + '자입니다. 60자 이내가 적정합니다. 핵심만 전달하고 세부 사항은 본문에서 서술하세요.',
        startIndex: 0,
        endIndex: firstSentence.length,
        severity: 'warning'
      });
    }

    // 질문형 리드 감지
    if (/[?？]/.test(firstSentence) || /나요|습니까|입니까|을까요|ㄹ까요|는가\?/.test(firstSentence)) {
      corrections.push({
        category: 'structure',
        original: firstSentence.substring(0, 50) + (firstSentence.length > 50 ? '...' : ''),
        suggested: '질문형 대신 사실을 직접 전달하는 리드로 바꾸세요',
        reason: '독자는 뉴스를 읽으러 왔지 퀴즈를 풀러 온 것이 아닙니다. 질문형 리드는 지양합니다.',
        startIndex: 0,
        endIndex: firstSentence.length,
        severity: 'warning'
      });
    }
  }

  // 단락 길이 체크 (5문장 초과)
  paragraphs.forEach(function(para) {
    const sentences = para.split(/[.!?。]\s*/).filter(function(s) { return s.trim().length > 0; });
    if (sentences.length > 5) {
      const paraStart = text.indexOf(para);
      corrections.push({
        category: 'structure',
        original: para.substring(0, 50) + '...',
        suggested: '단락을 2~3문장 단위로 나누세요',
        reason: '이 단락이 ' + sentences.length + '문장으로 너무 깁니다. 신문 기사의 단락은 2~3문장이 적정합니다.',
        startIndex: paraStart >= 0 ? paraStart : 0,
        endIndex: paraStart >= 0 ? paraStart + para.length : para.length,
        severity: 'warning'
      });
    }
  });

  // '~에 따르면' 호응 체크
  const allSentences = text.split(/(?<=[.!?。])\s+/);
  allSentences.forEach(function(sentence) {
    if (/에 따르면/.test(sentence)) {
      if (!/다고\s*(한다|밝혔다|전했다|말했다|설명했다|보도했다|발표했다|알려졌다|전해졌다)/.test(sentence) &&
          !/라고\s*(한다|밝혔다|전했다|말했다|설명했다|보도했다|발표했다)/.test(sentence)) {
        var sIdx = text.indexOf(sentence);
        corrections.push({
          category: 'structure',
          original: sentence.substring(0, 50) + (sentence.length > 50 ? '...' : ''),
          suggested: "문장 끝을 '~다고 한다/밝혔다' 형태로 호응시키세요",
          reason: "'~에 따르면'으로 시작한 문장은 '~다고 한다/밝혔다'로 끝나야 호응이 맞습니다.",
          startIndex: sIdx >= 0 ? sIdx : 0,
          endIndex: sIdx >= 0 ? sIdx + sentence.length : sentence.length,
          severity: 'warning'
        });
      }
    }
  });

  return corrections;
}

// ===== 메인 분석 함수 =====
async function analyzeArticle(text) {
  if (!text || text.trim().length === 0) {
    return {
      corrections: [],
      stats: { totalIssues: 0, byCategory: { spelling: 0, expression: 0, structure: 0, ethics: 0 }, score: 100 }
    };
  }

  const corrections = [];

  // 규칙 기반 매칭
  _engineRules.forEach(function(rule) {
    const regex = new RegExp(rule.pattern.source, rule.pattern.flags);
    let match;
    while ((match = regex.exec(text)) !== null) {
      const original = match[0];
      let suggested;
      if (rule.noAutoReplace) {
        suggested = '(수정 필요) ' + (rule.replacement || '삭제 또는 대체 권장');
      } else {
        suggested = original.replace(new RegExp(rule.pattern.source, ''), rule.replacement);
      }
      corrections.push({
        category: rule.category,
        original: original,
        suggested: suggested,
        reason: rule.reason,
        startIndex: match.index,
        endIndex: match.index + original.length,
        severity: rule.severity
      });
    }
  });

  // 구조 분석
  corrections.push.apply(corrections, _checkStructure(text));

  // 위치 기준 정렬
  corrections.sort(function(a, b) { return a.startIndex - b.startIndex; });

  // 통계 계산
  const byCategory = { spelling: 0, expression: 0, structure: 0, ethics: 0 };
  corrections.forEach(function(c) {
    if (byCategory[c.category] !== undefined) byCategory[c.category]++;
  });

  const totalIssues = corrections.length;

  // 점수: 100점 기준, error -5, warning -3, info -1
  let deductions = 0;
  corrections.forEach(function(c) {
    if (c.severity === 'error') deductions += 5;
    else if (c.severity === 'warning') deductions += 3;
    else deductions += 1;
  });
  const score = Math.max(0, 100 - deductions);

  return {
    corrections: corrections,
    stats: { totalIssues: totalIssues, byCategory: byCategory, score: score }
  };
}
</script>

<script>
// ===== UI Logic =====
(function() {
  'use strict';

  // DOM References
  const articleInput = document.getElementById('articleInput');
  const charCount = document.getElementById('charCount');
  const analyzeBtn = document.getElementById('analyzeBtn');
  const clearBtn = document.getElementById('clearBtn');
  const themeToggle = document.getElementById('themeToggle');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const scoreRing = document.getElementById('scoreRing');
  const scoreValue = document.getElementById('scoreValue');
  const filterBar = document.getElementById('filterBar');
  const statsSummary = document.getElementById('statsSummary');
  const emptyState = document.getElementById('emptyState');
  const loadingState = document.getElementById('loadingState');
  const correctionsList = document.getElementById('correctionsList');
  const errorMessage = document.getElementById('errorMessage');
  const issueCount = document.getElementById('issueCount');

  // aiProofBtn removed — unified into analyzeBtn
  const aiLoadingState = document.getElementById('aiLoadingState');

  const CATEGORY_LABELS = {
    spelling: '맞춤법',
    expression: '표현',
    structure: '구조',
    ethics: '윤리'
  };

  const SEVERITY_LABELS = {
    error: '오류',
    warning: '주의',
    info: '참고'
  };

  let currentResult = null;
  let activeFilter = 'all';
  let isAnalyzing = false;
  let isAiAnalyzing = false;

  // Character count
  articleInput.addEventListener('input', () => {
    charCount.textContent = articleInput.value.length + '자';
  });

  // Theme toggle
  themeToggle.addEventListener('click', () => {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  });

  // Clear button
  clearBtn.addEventListener('click', () => {
    articleInput.value = '';
    charCount.textContent = '0자';
    resetResults();
  });

  // Unified analyze button: rule-based + AI proofreading
  analyzeBtn.addEventListener('click', async () => {
    const text = articleInput.value.trim();
    if (!text) {
      showError('기사를 입력해 주세요.');
      return;
    }
    if (text.length < 10) {
      showError('최소 10자 이상 입력해 주세요.');
      return;
    }
    await runUnifiedAnalysis(text);
  });

  // Keyboard shortcut: Ctrl/Cmd + Enter
  articleInput.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      analyzeBtn.click();
    }
  });

  // Filter buttons
  filterBar.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    const category = btn.dataset.category;
    activeFilter = category;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCorrections();
  });

  async function runUnifiedAnalysis(text) {
    if (isAnalyzing || isAiAnalyzing) return;
    isAnalyzing = true;
    isAiAnalyzing = true;
    analyzeBtn.disabled = true;
    analyzeBtn.classList.remove('pulse');
    hideError();
    showLoading();

    // 1단계: 규칙 기반 분석 (즉시)
    try {
      const result = await analyzeArticle(text);
      currentResult = result;
      showResults(result);
    } catch (err) {
      // 규칙 분석 실패해도 AI 교정은 계속 진행
      console.error('규칙 분석 오류:', err);
    } finally {
      isAnalyzing = false;
      hideLoading();
    }

    // 2단계: AI 교정 (Anthropic Claude)
    const claudeApiKey = getClaudeApiKey();
    if (!claudeApiKey) {
      appendAiError('API 키를 입력하면 AI 교정도 함께 수행됩니다. 우측 상단에 Anthropic API Key를 입력하세요.');
      analyzeBtn.disabled = false;
      isAiAnalyzing = false;
      return;
    }

    showAiLoading();
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 60000);

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': claudeApiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        signal: controller.signal,
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4096,
          system: AI_SYSTEM_PROMPT,
          messages: [{
            role: 'user',
            content: '다음 기사를 교정해주세요:\n\n' + text
          }]
        })
      });

      clearTimeout(timeoutId);

      if (!response.ok) {
        const status = response.status;
        if (status === 401) {
          throw new Error('API 키가 올바르지 않습니다. Anthropic API 키를 확인해주세요.');
        } else if (status === 403) {
          throw new Error('API 접근 권한이 없습니다. API 키 설정을 확인해주세요.');
        } else if (status === 429) {
          throw new Error('요청 제한에 도달했습니다. 잠시 후 다시 시도해 주세요.');
        } else if (status >= 500) {
          throw new Error('AI 서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
        } else {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error?.message || 'API 요청 실패 (HTTP ' + status + ')');
        }
      }

      const data = await response.json();
      const aiText = data.content
        && data.content[0]
        && data.content[0].text;

      if (!aiText) {
        throw new Error('AI로부터 유효한 응답을 받지 못했습니다.');
      }

      hideAiLoading();
      // AI 결과를 규칙 분석 결과 아래에 추가
      appendAiResult(aiText);

    } catch (err) {
      hideAiLoading();
      if (err.name === 'AbortError') {
        appendAiError('AI 응답 시간이 초과되었습니다.');
      } else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError') || err.message.includes('network')) {
        appendAiError('네트워크 연결을 확인해주세요.');
      } else {
        appendAiError(err.message || 'AI 교정 중 오류가 발생했습니다.');
      }
    } finally {
      clearTimeout(timeoutId);
      isAiAnalyzing = false;
      analyzeBtn.disabled = false;
    }
  }

  function showResults(result) {
    hideLoading();
    emptyState.style.display = 'none';

    // Update score
    const score = result.stats.score;
    updateScore(score);

    // Update stats
    const bc = result.stats.byCategory;
    document.getElementById('statSpelling').textContent = bc.spelling || 0;
    document.getElementById('statExpression').textContent = bc.expression || 0;
    document.getElementById('statStructure').textContent = bc.structure || 0;
    document.getElementById('statEthics').textContent = bc.ethics || 0;
    statsSummary.classList.add('visible');

    // Update filter counts
    document.getElementById('countAll').textContent = result.stats.totalIssues;
    document.getElementById('countSpelling').textContent = bc.spelling || 0;
    document.getElementById('countExpression').textContent = bc.expression || 0;
    document.getElementById('countStructure').textContent = bc.structure || 0;
    document.getElementById('countEthics').textContent = bc.ethics || 0;
    filterBar.classList.add('visible');

    // Issue count
    issueCount.textContent = result.stats.totalIssues + '건 발견';

    // Reset filter
    activeFilter = 'all';
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    filterBar.querySelector('[data-category="all"]').classList.add('active');

    // Render corrections
    renderCorrections();
  }

  function renderCorrections() {
    if (!currentResult) return;
    correctionsList.classList.remove('hidden');

    const corrections = activeFilter === 'all'
      ? currentResult.corrections
      : currentResult.corrections.filter(c => c.category === activeFilter);

    if (corrections.length === 0) {
      correctionsList.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px;">' +
        (activeFilter === 'all' ? '수정 사항이 없습니다. 훌륭한 기사입니다!' : '해당 카테고리의 수정 사항이 없습니다.') +
        '</div>';
      return;
    }

    correctionsList.innerHTML = corrections.map((c, i) => {
      const badgeClass = 'badge-' + c.category;
      const severityClass = 'severity-' + c.severity;
      const isManualReview = c.suggested.startsWith('(수정 필요)');
      const diffHtml = isManualReview
        ? `<div class="correction-diff">
            <span class="diff-del">${escapeHtml(c.original)}</span>
            <span class="diff-arrow">&#10132;</span>
            <span class="diff-manual">직접 수정 필요</span>
          </div>`
        : `<div class="correction-diff">
            <span class="diff-del">${escapeHtml(c.original)}</span>
            <span class="diff-arrow">&#10132;</span>
            <span class="diff-add">${escapeHtml(c.suggested)}</span>
          </div>`;
      return `
        <div class="correction-item" style="animation-delay:${i * 0.05}s">
          <div class="correction-header">
            <div class="correction-badges">
              <span class="badge ${badgeClass}">${CATEGORY_LABELS[c.category] || c.category}</span>
              <span class="severity-dot ${severityClass}" title="${SEVERITY_LABELS[c.severity] || c.severity}"></span>
            </div>
          </div>
          ${diffHtml}
          <div class="correction-reason">${escapeHtml(c.reason)}</div>
        </div>
      `;
    }).join('');
  }

  function updateScore(score) {
    scoreDisplay.classList.add('visible');
    const circumference = 2 * Math.PI * 18; // r=18
    const offset = circumference * (1 - score / 100);
    const ring = scoreRing;

    let color;
    if (score >= 80) color = getComputedStyle(document.documentElement).getPropertyValue('--success').trim();
    else if (score >= 60) color = getComputedStyle(document.documentElement).getPropertyValue('--warning').trim();
    else color = getComputedStyle(document.documentElement).getPropertyValue('--error').trim();

    ring.style.stroke = color;
    ring.style.strokeDashoffset = offset;
    scoreValue.textContent = score;
    scoreValue.style.color = color;
  }

  function showLoading() {
    emptyState.style.display = 'none';
    correctionsList.classList.add('hidden');
    aiLoadingState.classList.remove('active');
    loadingState.classList.add('active');
  }

  function hideLoading() {
    loadingState.classList.remove('active');
  }

  function showError(msg) {
    errorMessage.textContent = msg;
    errorMessage.classList.add('visible');
  }

  function hideError() {
    errorMessage.classList.remove('visible');
  }

  function resetResults() {
    currentResult = null;
    activeFilter = 'all';
    scoreDisplay.classList.remove('visible');
    scoreRing.style.strokeDashoffset = '113.1';
    scoreValue.textContent = '—';
    filterBar.classList.remove('visible');
    statsSummary.classList.remove('visible');
    correctionsList.classList.add('hidden');
    correctionsList.innerHTML = '';
    emptyState.style.display = '';
    issueCount.textContent = '';
    hideError();
    hideAiLoading();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ===== AI Proofreading =====
  const AI_SYSTEM_PROMPT = `당신은 신문사의 수석 교열 기자입니다. 신입 기자가 작성한 기사 초안을 검토하고 수정 제안을 해주세요.

다음 기준으로 교정하세요:
1. 맞춤법/표기: 자주 틀리는 맞춤법(않된다→안 된다, 돼었→되었 등), 띄어쓰기(관형사+의존명사 띄어쓰기, '만/간' 구분), 외래어 표기(컨텐츠→콘텐츠, 메세지→메시지 등)
2. 표현/문체: 번역체 표현(~에 있어, ~로부터, ~에 대한, ~에 의해, ~의 경우), 이중 피동(잊혀지다→잊히다, 쓰여지다→쓰이다), 중복 표현(과반수 이상, 거의 대부분), 군더더기, '-시키다' 남용(입금시키다→입금하다)
3. 기사 구조: 리드 길이(60자 이내 권장), 역피라미드 구조(핵심→세부→배경→부가), 인용문 처리(직접인용은 "~라고", 간접인용은 ~고), '~에 따르면' 호응(문장 끝 '~다고 한다/밝혔다'로 맺기), 단락 길이(2~3문장 적정)
4. 정확성/윤리: 차별 표현(여류, 여기자, 미망인, 장애우, 불법체류자 등), 선정적/과장 표현(충격, 역대급, 경악), 모호한 출처(업계에서는, 전문가들은), 상관관계와 인과관계 혼동, 통계 오용

각 수정 제안은 다음 형식으로 작성해주세요:
- **수정 전**: 원문 해당 부분
- **수정 후**: 교정된 표현
- **이유**: 왜 수정이 필요한지

마지막에 전체적인 기사 평가와 개선 방향도 제시해주세요.`;

  // API Key management (Anthropic Claude)
  const apiKeyInput = document.getElementById('apiKeyInput');
  const apiKeyToggle = document.getElementById('apiKeyToggle');
  const apiKeyStatus = document.getElementById('apiKeyStatus');

  // Load saved key from localStorage
  const savedKey = localStorage.getItem('anthropic_api_key');
  if (savedKey) {
    apiKeyInput.value = savedKey;
    apiKeyStatus.textContent = '저장됨';
    apiKeyStatus.style.color = 'var(--success)';
  }

  // Save key on change
  apiKeyInput.addEventListener('change', () => {
    const key = apiKeyInput.value.trim();
    if (key) {
      localStorage.setItem('anthropic_api_key', key);
      apiKeyStatus.textContent = '저장됨';
      apiKeyStatus.style.color = 'var(--success)';
    } else {
      localStorage.removeItem('anthropic_api_key');
      apiKeyStatus.textContent = '';
    }
  });

  // Toggle key visibility
  apiKeyToggle.addEventListener('click', () => {
    if (apiKeyInput.type === 'password') {
      apiKeyInput.type = 'text';
      apiKeyToggle.textContent = '\u{1F648}';
    } else {
      apiKeyInput.type = 'password';
      apiKeyToggle.textContent = '\u{1F441}';
    }
  });

  function getClaudeApiKey() {
    const key = apiKeyInput.value.trim();
    if (!key) return null;
    return key;
  }

  function showAiLoading() {
    aiLoadingState.classList.add('active');
  }

  function hideAiLoading() {
    aiLoadingState.classList.remove('active');
  }

  function appendAiResult(markdownText) {
    const html = markdownToHtml(markdownText);
    const aiContainer = document.createElement('div');
    aiContainer.innerHTML =
      '<div class="ai-result-container" style="margin-top:16px;">' +
        '<div class="ai-result-header">' +
          '<span class="ai-result-badge">' +
            '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M12.5 3.5l-1.4 1.4M4.9 11.1l-1.4 1.4"/>' +
              '<circle cx="8" cy="8" r="2.5" fill="currentColor" opacity="0.3"/>' +
            '</svg>' +
            'Claude AI' +
          '</span>' +
          '<span class="ai-result-title">AI 교정 결과</span>' +
        '</div>' +
        '<div class="ai-result-body">' + html + '</div>' +
      '</div>';
    correctionsList.appendChild(aiContainer);
  }

  function appendAiError(message) {
    const errContainer = document.createElement('div');
    errContainer.innerHTML =
      '<div class="ai-result-container" style="margin-top:16px;opacity:0.7;">' +
        '<div class="ai-result-header">' +
          '<span class="ai-result-badge">' +
            '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M12.5 3.5l-1.4 1.4M4.9 11.1l-1.4 1.4"/>' +
              '<circle cx="8" cy="8" r="2.5" fill="currentColor" opacity="0.3"/>' +
            '</svg>' +
            'Claude AI' +
          '</span>' +
          '<span class="ai-result-title" style="color:var(--warning);">AI 교정 실패</span>' +
        '</div>' +
        '<div class="ai-result-body"><p>' + message + ' (규칙 기반 분석 결과는 위에 표시됩니다)</p></div>' +
      '</div>';
    correctionsList.appendChild(errContainer);
  }

  function markdownToHtml(md) {
    let html = md;

    // Escape HTML entities first
    html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Headings (#### before ### before ## before #)
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Horizontal rules
    html = html.replace(/^---+$/gm, '<hr>');

    // Bold and italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Blockquotes
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    // Unordered lists: convert consecutive "- " lines into <ul><li>...</li></ul>
    html = html.replace(/(^- .+$(\n- .+$)*)/gm, function(block) {
      const items = block.split('\n').map(function(line) {
        return '<li>' + line.replace(/^- /, '') + '</li>';
      }).join('');
      return '<ul>' + items + '</ul>';
    });

    // Ordered lists: convert consecutive "1. " lines
    html = html.replace(/(^\d+\. .+$(\n\d+\. .+$)*)/gm, function(block) {
      const items = block.split('\n').map(function(line) {
        return '<li>' + line.replace(/^\d+\. /, '') + '</li>';
      }).join('');
      return '<ol>' + items + '</ol>';
    });

    // Paragraphs: wrap remaining lines not inside tags
    html = html.split('\n\n').map(function(block) {
      block = block.trim();
      if (!block) return '';
      if (/^<(h[1-4]|ul|ol|blockquote|hr|li|p)/.test(block)) return block;
      return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');

    return html;
  }

})();
</script>
