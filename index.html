<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기사 교정기</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:          #0f1117;
  --bg-surface:  #1a1b23;
  --bg-elevated: #23242f;
  --bg-muted:    #181920;
  --text:        #e4e4e7;
  --text-muted:  #9ca3af;
  --border:      #2e2f3a;
  --accent:      #6366f1;
  --accent-hover:#818cf8;
  --success:     #22c55e;
  --danger:      #ef4444;
  --warning-color:#f59e0b;
  --info-color:  #3b82f6;
  --diff-del-bg: rgba(239,68,68,.18);
  --diff-del-text:#fca5a5;
  --diff-ins-bg: rgba(34,197,94,.18);
  --diff-ins-text:#86efac;
  --radius:      12px;
  --radius-sm:   8px;
  --shadow:      0 4px 24px rgba(0,0,0,.3);
  --transition:  .25s cubic-bezier(.4,0,.2,1);
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
}

[data-theme="light"]{
  --bg:          #f8f9fa;
  --bg-surface:  #ffffff;
  --bg-elevated: #f1f3f5;
  --bg-muted:    #e9ecef;
  --text:        #1a1b23;
  --text-muted:  #6b7280;
  --border:      #dee2e6;
  --shadow:      0 4px 24px rgba(0,0,0,.08);
  --diff-del-bg: rgba(239,68,68,.12);
  --diff-del-text:#b91c1c;
  --diff-ins-bg: rgba(34,197,94,.12);
  --diff-ins-text:#15803d;
}

html{font-size:16px}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background var(--transition),color var(--transition);
  line-height:1.7;
}

/* --- Nav --- */
.nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:16px;
  padding:12px 24px;
  background:var(--bg-surface);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.nav-logo{
  font-size:1.15rem;font-weight:700;
  color:var(--accent);white-space:nowrap;
}
.nav-spacer{flex:1}
.theme-btn{
  background:none;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:6px 10px;cursor:pointer;color:var(--text);font-size:1rem;
  transition:all var(--transition);
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}

/* --- Screens --- */
.screen{display:none;animation:fadeIn .35s ease}
.screen.active{display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* --- Input Screen --- */
.input-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 24px;min-height:calc(100vh - 57px);
}
.input-screen h1{
  font-size:1.6rem;font-weight:700;margin-bottom:8px;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.input-screen p{color:var(--text-muted);margin-bottom:32px;font-size:.95rem}
.input-area{width:100%;max-width:720px}
.article-textarea{
  width:100%;min-height:280px;max-height:60vh;
  padding:20px;resize:vertical;
  border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg-surface);color:var(--text);
  font-family:var(--font);font-size:1rem;line-height:1.8;
  transition:border var(--transition);
}
.article-textarea:focus{outline:none;border-color:var(--accent)}
.article-textarea::placeholder{color:var(--text-muted)}
.input-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;
}
.char-count{font-size:.82rem;color:var(--text-muted)}
.btn-primary{
  padding:12px 32px;border:none;border-radius:var(--radius-sm);
  background:var(--accent);color:#fff;
  font-size:1rem;font-weight:600;cursor:pointer;
  transition:all var(--transition);
}
.btn-primary:hover:not(:disabled){background:var(--accent-hover);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* --- Compare Screen --- */
.compare-screen{
  flex:1;padding:0;min-height:calc(100vh - 57px);
  display:flex;flex-direction:column;
}
.compare-toolbar{
  display:flex;align-items:center;gap:12px;
  padding:12px 24px;
  background:var(--bg-surface);
  border-bottom:1px solid var(--border);
}
.btn-secondary{
  padding:8px 20px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text);
  font-size:.88rem;cursor:pointer;
  transition:all var(--transition);
}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.toolbar-spacer{flex:1}
.toolbar-stats{
  font-size:.82rem;color:var(--text-muted);
  display:flex;gap:12px;align-items:center;
}
.toolbar-stats .stat-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 10px;border-radius:12px;font-weight:600;font-size:.78rem;
}
.stat-badge.error{background:rgba(239,68,68,.15);color:var(--danger)}
.stat-badge.warning{background:rgba(245,158,11,.15);color:var(--warning-color)}
.stat-badge.info{background:rgba(59,130,246,.15);color:var(--info-color)}
.stat-score{
  font-weight:700;font-size:.88rem;
}
.copy-toast{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:10px 24px;border-radius:var(--radius-sm);
  background:var(--success);color:#fff;font-size:.88rem;font-weight:600;
  opacity:0;pointer-events:none;
  transition:all .3s ease;z-index:999;
}
.copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.compare-panels{
  display:grid;grid-template-columns:1fr 1fr;
  flex:1;overflow:hidden;
}
.panel{
  display:flex;flex-direction:column;
  overflow:hidden;
}
.panel-header{
  padding:10px 20px;
  font-size:.82rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-muted);
  border-bottom:1px solid var(--border);
  background:var(--bg-surface);
}
.panel-left{border-right:1px solid var(--border)}
.panel-left .panel-body{background:var(--bg-muted)}
.panel-body{
  flex:1;overflow-y:auto;
  padding:24px;
  font-size:.95rem;line-height:1.9;
  white-space:normal;word-wrap:break-word;
}
.panel-body p{margin:0;text-indent:0}
.panel-body:focus{outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px}

/* diff highlights */
.diff-del{
  background:var(--diff-del-bg);color:var(--diff-del-text);
  text-decoration:line-through;border-radius:3px;padding:0 2px;
}
.diff-ins{
  background:var(--diff-ins-bg);color:var(--diff-ins-text);
  border-radius:3px;padding:0 2px;
}

/* highlight for noAutoReplace warnings in original panel */
.highlight-warn{
  background:rgba(245,158,11,.2);
  border-bottom:2px dashed var(--warning-color);
  border-radius:2px;padding:0 2px;
  cursor:help;
}

/* --- Corrections List --- */
.corrections-section{
  border-top:1px solid var(--border);
  background:var(--bg-surface);
  max-height:40vh;overflow-y:auto;
}
.corrections-header{
  padding:12px 24px;
  font-size:.88rem;font-weight:700;
  color:var(--text);
  border-bottom:1px solid var(--border);
  background:var(--bg-elevated);
  position:sticky;top:0;z-index:1;
  display:flex;align-items:center;justify-content:space-between;
}
.corrections-toggle{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:.82rem;padding:4px 8px;
}
.corrections-toggle:hover{color:var(--accent)}
.corrections-list{
  padding:0;margin:0;list-style:none;
}
.correction-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 24px;
  border-bottom:1px solid var(--border);
  font-size:.85rem;line-height:1.6;
  transition:background .15s;
}
.correction-item:hover{background:var(--bg-elevated)}
.correction-icon{
  flex-shrink:0;width:22px;height:22px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;margin-top:2px;
}
.correction-icon.error{background:rgba(239,68,68,.2);color:var(--danger)}
.correction-icon.warning{background:rgba(245,158,11,.2);color:var(--warning-color)}
.correction-icon.info{background:rgba(59,130,246,.2);color:var(--info-color)}
.correction-body{flex:1;min-width:0}
.correction-change{margin-bottom:2px}
.correction-change .original{
  text-decoration:line-through;color:var(--diff-del-text);
  background:var(--diff-del-bg);border-radius:3px;padding:0 3px;
}
.correction-change .arrow{color:var(--text-muted);margin:0 6px}
.correction-change .suggested{
  color:var(--diff-ins-text);background:var(--diff-ins-bg);
  border-radius:3px;padding:0 3px;
}
.correction-reason{color:var(--text-muted);font-size:.8rem}
.correction-category{
  flex-shrink:0;font-size:.72rem;font-weight:600;
  padding:2px 8px;border-radius:10px;
  background:var(--bg-elevated);color:var(--text-muted);
  white-space:nowrap;margin-top:2px;
}
.tag-manual{
  display:inline-block;font-size:.7rem;font-weight:600;
  padding:1px 6px;border-radius:8px;
  background:rgba(245,158,11,.15);color:var(--warning-color);
  margin-left:6px;
}

/* --- Error --- */
.error-msg{
  margin-top:12px;padding:12px 16px;
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.3);
  border-radius:var(--radius-sm);
  color:var(--danger);font-size:.88rem;
  max-width:720px;width:100%;
}

/* --- No Issues --- */
.no-issues{
  padding:40px 24px;text-align:center;color:var(--text-muted);font-size:.95rem;
}

/* --- AI Deep Review Section --- */
.ai-review-trigger{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,#7c3aed,#4f46e5);
  color:#fff;border:none;cursor:pointer;
  font-size:.85rem;font-weight:600;
  transition:transform var(--transition),box-shadow var(--transition);
}
.ai-review-trigger:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px rgba(124,58,237,.35)}
.ai-review-trigger:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.ai-review-section{
  border-top:1px solid var(--border);
  background:var(--bg-surface);
  max-height:50vh;overflow-y:auto;
}
.ai-review-section.hidden{display:none}
.ai-review-header{
  padding:12px 24px;
  font-size:.88rem;font-weight:700;color:var(--text);
  border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(79,70,229,.12));
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:1;
}
.ai-review-header-left{display:flex;align-items:center;gap:10px}
.ai-review-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700;
  background:rgba(124,58,237,.2);color:#a78bfa;
}
.ai-review-close{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:1.1rem;padding:4px 8px;line-height:1;
}
.ai-review-close:hover{color:var(--text)}
.ai-review-body{padding:14px 24px 20px}
.ai-review-loading{
  padding:32px 24px;text-align:center;color:var(--text-muted);font-size:.9rem;
}
.ai-review-spinner{
  display:inline-block;width:18px;height:18px;margin-right:8px;
  border:2px solid var(--border);border-top-color:#a78bfa;border-radius:50%;
  animation:ai-spin .8s linear infinite;vertical-align:-4px;
}
@keyframes ai-spin{to{transform:rotate(360deg)}}
.ai-review-error{
  padding:16px 20px;margin:12px 0;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  border-radius:var(--radius-sm);color:var(--danger);font-size:.85rem;
}
.ai-score-row{
  display:flex;align-items:center;gap:14px;margin-bottom:12px;
}
.ai-score-value{
  font-size:1.8rem;font-weight:800;
  background:linear-gradient(135deg,#a78bfa,#818cf8);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  line-height:1;
}
.ai-score-label{font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.ai-overall{
  padding:12px 14px;margin-bottom:16px;
  background:var(--bg-elevated);border-radius:var(--radius-sm);
  font-size:.9rem;line-height:1.6;color:var(--text);
}
.ai-section-title{
  font-size:.78rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text-muted);
  margin:16px 0 8px;
}
.ai-issue-list{list-style:none;padding:0;margin:0}
.ai-issue-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;margin-bottom:6px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg-muted);
  font-size:.85rem;line-height:1.55;
}
.ai-issue-icon{
  flex-shrink:0;width:20px;height:20px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;margin-top:1px;
}
.ai-issue-icon.critical{background:rgba(239,68,68,.2);color:var(--danger)}
.ai-issue-icon.warning{background:rgba(245,158,11,.2);color:var(--warning-color)}
.ai-issue-icon.suggestion{background:rgba(59,130,246,.2);color:var(--info-color)}
.ai-issue-body{flex:1;min-width:0}
.ai-issue-change .original{
  text-decoration:line-through;color:var(--diff-del-text);
  background:var(--diff-del-bg);border-radius:3px;padding:0 4px;
}
.ai-issue-change .arrow{color:var(--text-muted);margin:0 6px}
.ai-issue-change .suggestion{
  color:var(--diff-ins-text);background:var(--diff-ins-bg);
  border-radius:3px;padding:0 4px;
}
.ai-issue-explanation{color:var(--text-muted);font-size:.8rem;margin-top:4px}
.ai-issue-type{
  flex-shrink:0;font-size:.68rem;font-weight:600;
  padding:2px 8px;border-radius:10px;
  background:var(--bg-elevated);color:var(--text-muted);
  white-space:nowrap;margin-top:2px;
}
.ai-structural-list{list-style:disc;padding-left:20px;margin:0}
.ai-structural-list li{
  font-size:.85rem;color:var(--text);line-height:1.6;margin-bottom:4px;
}

/* --- Responsive --- */
/* --- Archive Screen --- */
.archive-screen{
  flex:1;display:flex;flex-direction:column;
  min-height:calc(100vh - 57px);
}
.archive-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 24px;
  background:var(--bg-surface);
  border-bottom:1px solid var(--border);
}
.archive-header h2{
  font-size:1.1rem;font-weight:700;margin:0;
}
.archive-header .toolbar-spacer{flex:1}
.archive-body{
  flex:1;overflow-y:auto;
  padding:24px;
  max-width:840px;width:100%;margin:0 auto;
}
.archive-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;min-height:300px;
  color:var(--text-muted);font-size:.95rem;text-align:center;
}
.archive-empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:.5}
.archive-card{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 20px;
  margin-bottom:12px;
  cursor:pointer;
  transition:all var(--transition);
  position:relative;
}
.archive-card:hover{
  border-color:var(--accent);
  box-shadow:0 2px 12px rgba(99,102,241,.12);
  transform:translateY(-1px);
}
.archive-card-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
.archive-card-date{
  font-size:.8rem;color:var(--text-muted);
}
.archive-card-stats{
  display:flex;gap:8px;align-items:center;
}
.archive-card-score{
  font-weight:700;font-size:.85rem;color:var(--accent);
}
.archive-card-corrections{
  font-size:.78rem;color:var(--text-muted);
}
.archive-card-preview{
  font-size:.9rem;line-height:1.6;
  color:var(--text);
  overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.archive-card-delete{
  position:absolute;top:10px;right:10px;
  background:none;border:none;
  color:var(--text-muted);font-size:1rem;
  cursor:pointer;padding:4px 8px;border-radius:var(--radius-sm);
  transition:all var(--transition);
  line-height:1;
}
.archive-card-delete:hover{
  background:rgba(239,68,68,.15);color:var(--danger);
}
.archive-footer{
  padding:16px 24px;
  border-top:1px solid var(--border);
  background:var(--bg-surface);
  text-align:center;
}
.btn-danger{
  padding:8px 20px;border:1px solid var(--danger);border-radius:var(--radius-sm);
  background:transparent;color:var(--danger);
  font-size:.88rem;cursor:pointer;
  transition:all var(--transition);
}
.btn-danger:hover{background:rgba(239,68,68,.15)}
.nav-archive-btn{
  background:none;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:6px 10px;cursor:pointer;color:var(--text);font-size:.88rem;
  transition:all var(--transition);
  display:inline-flex;align-items:center;gap:4px;
}
.nav-archive-btn:hover{border-color:var(--accent);color:var(--accent)}

/* --- Access Code on archive card --- */
.archive-card-code{
  margin-top:8px;padding-top:8px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.archive-card-code-text{
  font-family:'Courier New',Courier,monospace;
  font-size:.9rem;font-weight:700;
  color:var(--accent);letter-spacing:.15em;
}
.archive-card-code-copy{
  background:none;border:none;cursor:pointer;
  font-size:.85rem;padding:2px 4px;color:var(--text-muted);
  transition:color var(--transition);
}
.archive-card-code-copy:hover{color:var(--accent)}

/* --- Modal Overlay --- */
.modal-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
  animation:fadeIn .25s ease;
}
.modal-box{
  background:var(--bg-surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  width:90%;max-width:400px;
  padding:0;
  position:relative;
  animation:fadeIn .25s ease;
}
.modal-close{
  position:absolute;top:10px;right:12px;
  background:none;border:none;
  color:var(--text-muted);font-size:1.3rem;cursor:pointer;
  line-height:1;padding:4px;
  transition:color var(--transition);
}
.modal-close:hover{color:var(--text)}
.modal-header{
  padding:20px 24px 0;
  font-size:1.1rem;font-weight:700;
  color:var(--text);
}
.modal-body{
  padding:16px 24px 24px;
}
.modal-body label{
  display:block;font-size:.85rem;font-weight:600;
  color:var(--text-muted);margin-bottom:6px;
}
.modal-body input[type="password"],
.modal-body input[type="text"]{
  width:100%;padding:12px 16px;
  border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--bg-surface);color:var(--text);
  font-family:var(--font);font-size:1rem;
  transition:border var(--transition);
  margin-bottom:12px;
}
.modal-body input:focus{outline:none;border-color:var(--accent)}
.modal-body .btn-primary{width:100%;margin-top:4px}
.modal-body .modal-error{
  font-size:.82rem;color:var(--danger);
  margin-bottom:8px;min-height:1.2em;
}

/* --- Modal Tabs --- */
.modal-tabs{
  display:flex;border-bottom:1px solid var(--border);
}
.modal-tab{
  flex:1;padding:12px 16px;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--text-muted);font-size:.9rem;font-weight:600;
  cursor:pointer;transition:all var(--transition);text-align:center;
}
.modal-tab:hover{color:var(--text)}
.modal-tab.active{
  color:var(--accent);border-bottom-color:var(--accent);
}
.modal-tab-content{display:none}
.modal-tab-content.active{display:block}

/* --- Access Code Display Modal --- */
.access-code-display{
  text-align:center;padding:12px 0;
  font-family:'Courier New',Courier,monospace;
  font-size:2rem;font-weight:700;
  letter-spacing:.2em;
  color:var(--accent);
  background:var(--bg-elevated);
  border-radius:var(--radius-sm);
  margin-bottom:16px;
}
.access-code-note{
  font-size:.82rem;color:var(--text-muted);
  text-align:center;margin-bottom:16px;
}

/* --- Password Change Button --- */
.btn-secondary-sm{
  padding:8px 20px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:transparent;color:var(--text);
  font-size:.88rem;cursor:pointer;
  transition:all var(--transition);
  margin-left:8px;
}
.btn-secondary-sm:hover{border-color:var(--accent);color:var(--accent)}

/* --- Access Code Input Styling --- */
.access-code-input{
  text-transform:uppercase;
  font-family:'Courier New',Courier,monospace;
  letter-spacing:.15em;
  text-align:center;
  font-size:1.1rem !important;
}

@media(max-width:768px){
  .nav{padding:10px 16px;flex-wrap:wrap}
  .compare-panels{grid-template-columns:1fr;grid-template-rows:1fr 1fr}
  .panel-left{border-right:none;border-bottom:1px solid var(--border)}
  .input-screen{padding:32px 16px}
  .corrections-section{max-height:50vh}
  .archive-body{padding:16px}
  .archive-card{padding:12px 16px}
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo">기사 교정기</div>
  <div class="nav-spacer"></div>
  <button class="nav-archive-btn" id="archiveBtn" title="교정 이력">&#128197; 아카이브</button>
  <button class="theme-btn" id="themeToggle" title="테마 전환">&#9788;</button>
</nav>

<!-- Input Screen -->
<main class="screen active" id="inputScreen">
  <div class="input-screen">
    <h1>기사 교정</h1>
    <p>기사 초안을 입력하고 교정 버튼을 누르세요</p>
    <div class="input-area">
      <textarea class="article-textarea" id="articleInput"
        placeholder="여기에 기사 초안을 붙여넣으세요..."></textarea>
      <div class="input-footer">
        <span class="char-count" id="charCount">0자</span>
        <button class="btn-primary" id="proofreadBtn">교정하기</button>
      </div>
      <div id="errorContainer"></div>
    </div>
  </div>
</main>

<!-- Compare Screen -->
<main class="screen" id="compareScreen">
  <div class="compare-screen">
    <div class="compare-toolbar">
      <button class="btn-secondary" id="backBtn">&#8592; 다시 교정하기</button>
      <button class="btn-secondary" id="newArticleBtn" title="초기 화면으로 돌아가기">&#128221; 새 기사</button>
      <div class="toolbar-stats" id="toolbarStats"></div>
      <div class="toolbar-spacer"></div>
      <button class="ai-review-trigger" id="aiReviewBtn" title="대규모 언어 모델로 기사 전반을 심화 검토">&#129302; AI 심화 검토</button>
      <button class="btn-secondary" id="copyBtn">수정본 복사</button>
    </div>
    <div class="compare-panels">
      <div class="panel panel-left">
        <div class="panel-header">원문</div>
        <div class="panel-body" id="originalPanel" spellcheck="false"></div>
      </div>
      <div class="panel">
        <div class="panel-header">수정본 (편집 가능)</div>
        <div class="panel-body" id="revisedPanel" contenteditable="true" spellcheck="false"></div>
        <div class="char-count" id="revisedCharCount" style="text-align:right;padding:6px 12px;font-size:.8rem;color:var(--text-muted);">0자</div>
      </div>
    </div>
    <div class="corrections-section" id="correctionsSection">
      <div class="corrections-header">
        <span id="correctionsTitle">교정 사항</span>
        <button class="corrections-toggle" id="correctionsToggle">접기</button>
      </div>
      <ul class="corrections-list" id="correctionsList"></ul>
    </div>

    <!-- AI Deep Review Section — hidden by default -->
    <div class="ai-review-section hidden" id="aiReviewSection">
      <div class="ai-review-header">
        <div class="ai-review-header-left">
          <span>&#129302; AI 심화 검토</span>
          <span class="ai-review-badge" id="aiReviewBadge">Claude Sonnet</span>
        </div>
        <button class="ai-review-close" id="aiReviewClose" title="닫기">&times;</button>
      </div>
      <div class="ai-review-body" id="aiReviewBody">
        <div class="ai-review-loading" id="aiReviewLoading">
          <span class="ai-review-spinner"></span>분석 중입니다&hellip; 길면 10초 정도 걸릴 수 있습니다.
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Archive Screen -->
<main class="screen" id="archiveScreen">
  <div class="archive-screen">
    <div class="archive-header">
      <button class="btn-secondary" id="archiveBackBtn">&#8592; 뒤로</button>
      <h2>&#128197; 교정 이력</h2>
      <div class="toolbar-spacer"></div>
    </div>
    <div class="archive-body" id="archiveBody"></div>
    <div class="archive-footer" id="archiveFooter" style="display:none">
      <button class="btn-danger" id="archiveClearBtn">전체 삭제</button>
      <button class="btn-secondary-sm" id="changePwBtn" style="display:none">비밀번호 변경</button>
    </div>
  </div>
</main>

<!-- Copy Toast -->
<div class="copy-toast" id="copyToast">클립보드에 복사되었습니다</div>

function checkStructure(text) {
  const corrections = [];
  const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);

  if (paragraphs.length > 0) {
    const firstParagraph = paragraphs[0].trim();
    const firstSentenceMatch = firstParagraph.match(/^[^.!?。]*[.!?。]/);
    const firstSentence = firstSentenceMatch ? firstSentenceMatch[0] : firstParagraph;
    const cleanSentence = firstSentence.replace(/\s+/g, '');

    if (cleanSentence.length > 60) {
      corrections.push({
        category: 'structure',
        original: firstSentence.substring(0, 50) + '...',
        suggested: '리드를 60자 이내로 줄이세요',
        reason: '리드(첫 문장)가 ' + cleanSentence.length + '자입니다. 60자 이내가 적정합니다. 핵심만 전달하고 세부 사항은 본문에서 서술하세요.',
        startIndex: 0,
        endIndex: firstSentence.length,
        severity: 'warning',
        noAutoReplace: true
      });
    }

    if (/[?？]/.test(firstSentence) || /나요|습니까|입니까|을까요|ㄹ까요|는가\?/.test(firstSentence)) {
      corrections.push({
        category: 'structure',
        original: firstSentence.substring(0, 50) + (firstSentence.length > 50 ? '...' : ''),
        suggested: '질문형 대신 사실을 직접 전달하는 리드로 바꾸세요',
        reason: '독자는 뉴스를 읽으러 왔지 퀴즈를 풀러 온 것이 아닙니다. 질문형 리드는 지양합니다.',
        startIndex: 0,
        endIndex: firstSentence.length,
        severity: 'warning',
        noAutoReplace: true
      });
    }
  }

  paragraphs.forEach(function(para) {
    const sentences = para.split(/[.!?。]\s*/).filter(function(s){ return s.trim().length > 0; });
    if (sentences.length > 5) {
      const paraStart = text.indexOf(para);
      corrections.push({
        category: 'structure',
        original: para.substring(0, 50) + '...',
        suggested: '단락을 2~3문장 단위로 나누세요',
        reason: '이 단락이 ' + sentences.length + '문장으로 너무 깁니다. 신문 기사의 단락은 2~3문장이 적정합니다.',
        startIndex: paraStart >= 0 ? paraStart : 0,
        endIndex: paraStart >= 0 ? paraStart + para.length : para.length,
        severity: 'warning',
        noAutoReplace: true
      });
    }
  });

  const sentences = text.split(/(?<=[.!?。])\s+/);
  sentences.forEach(function(sentence) {
    if (/에 따르면/.test(sentence)) {
      if (!/다고\s*(한다|밝혔다|전했다|말했다|설명했다|보도했다|발표했다|알려졌다|전해졌다)/.test(sentence) &&
          !/라고\s*(한다|밝혔다|전했다|말했다|설명했다|보도했다|발표했다)/.test(sentence)) {
        var sIdx = text.indexOf(sentence);
        corrections.push({
          category: 'structure',
          original: sentence.substring(0, 50) + (sentence.length > 50 ? '...' : ''),
          suggested: "문장 끝을 '~다고 한다/밝혔다' 형태로 호응시키세요",
          reason: "'~에 따르면'으로 시작한 문장은 '~다고 한다/밝혔다'로 끝나야 호응이 맞습니다.",
          startIndex: sIdx >= 0 ? sIdx : 0,
          endIndex: sIdx >= 0 ? sIdx + sentence.length : sentence.length,
          severity: 'warning',
          noAutoReplace: true
        });
      }
    }
  });

  return corrections;
}

function analyzeArticle(text) {
  if (!text || text.trim().length === 0) {
    return {
      corrections: [],
      stats: { totalIssues: 0, byCategory: { spelling: 0, expression: 0, structure: 0, ethics: 0 }, score: 100 }
    };
  }

  var corrections = [];

  rules.forEach(function(rule) {
    var regex = new RegExp(rule.pattern.source, rule.pattern.flags);
    var match;
    while ((match = regex.exec(text)) !== null) {
      var original = match[0];
      var suggested;
      if (rule.noAutoReplace) {
        suggested = '(수정 필요) ' + (rule.replacement || '삭제 또는 대체 권장');
      } else {
        suggested = original.replace(new RegExp(rule.pattern.source, ''), rule.replacement);
      }

      corrections.push({
        category: rule.category,
        original: original,
        suggested: suggested,
        reason: rule.reason,
        startIndex: match.index,
        endIndex: match.index + original.length,
        severity: rule.severity,
        noAutoReplace: !!rule.noAutoReplace
      });
    }
  });

  var structureCorrections = checkStructure(text);
  corrections.push.apply(corrections, structureCorrections);

  corrections.sort(function(a, b) { return a.startIndex - b.startIndex; });

  var byCategory = { spelling: 0, expression: 0, structure: 0, ethics: 0 };
  corrections.forEach(function(c) {
    if (byCategory[c.category] !== undefined) {
      byCategory[c.category]++;
    }
  });

  var totalIssues = corrections.length;
  var deductions = 0;
  corrections.forEach(function(c) {
    if (c.severity === 'error') deductions += 5;
    else if (c.severity === 'warning') deductions += 3;
    else deductions += 1;
  });
  var score = Math.max(0, 100 - deductions);

  return {
    corrections: corrections,
    stats: { totalIssues: totalIssues, byCategory: byCategory, score: score }
  };
}

// =============================================================
// SHA-256 Hash
// =============================================================
async function sha256(text) {
  var data = new TextEncoder().encode(text);
  var hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

// =============================================================
// Access Code Generator
// =============================================================
function generateAccessCode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code = '';
  for (var i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function createModal(content, opts) {
  opts = opts || {};
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  var box = document.createElement('div');
  box.className = 'modal-box';
  if (!opts.noClose) {
    var closeBtn = document.createElement('button');
    closeBtn.className = 'modal-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.addEventListener('click', function(){ overlay.remove(); });
    box.appendChild(closeBtn);
  }
  if (typeof content === 'string') {
    box.innerHTML += content;
  } else {
    box.appendChild(content);
  }
  overlay.appendChild(box);
  overlay.addEventListener('click', function(e){
    if (e.target === overlay && !opts.noClose) overlay.remove();
  });
  document.body.appendChild(overlay);
  return overlay;
}

// =============================================================
// AI Deep Review
// =============================================================
function escapeHtml(s){
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderAiReviewError(message){
  aiReviewBody.innerHTML = '<div class="ai-review-error">' + escapeHtml(message) + '</div>';
}

function renderAiReviewResult(review, model){
  if (!review || typeof review !== 'object') {
    renderAiReviewError('모델 응답을 해석하지 못했습니다.');
    return;
  }
  if (model) aiReviewBadge.textContent = model;

  var html = '';

  // 한글 키 우선, 영문 키 폴백 (기존 캐시 호환)
  var score = typeof review['점수'] === 'number' ? review['점수'] : review.score;
  var overall = review['전반적_평가'] || review.overall_assessment;
  var issues = review['지적사항'] || review.issues;
  var structNotes = review['구조적_관찰'] || review.structural_notes;

  if (typeof score === 'number') {
    html += '<div class="ai-score-row">';
    html += '<div class="ai-score-value">' + Math.round(score) + '</div>';
    html += '<div class="ai-score-label">AI 평점 / 100</div>';
    html += '</div>';
  }

  if (overall) {
    html += '<div class="ai-overall">' + escapeHtml(overall) + '</div>';
  }

  if (Array.isArray(issues) && issues.length > 0) {
    html += '<div class="ai-section-title">지적 사항 (' + issues.length + '건)</div>';
    html += '<ul class="ai-issue-list">';
    var order = { critical: 0, warning: 1, suggestion: 2 };
    var sorted = issues.slice().sort(function(a,b){
      var sa = a['심각도'] || a.severity;
      var sb = b['심각도'] || b.severity;
      return (order[sa] || 3) - (order[sb] || 3);
    });
    for (var i = 0; i < sorted.length; i++) {
      var it = sorted[i];
      var sev = it['심각도'] || it.severity || 'suggestion';
      var orig = it['원문'] || it.original;
      var sugg = it['제안'] || it.suggestion;
      var expl = it['설명'] || it.explanation;
      var typ = it['유형'] || it.type;
      var iconLetter = sev === 'critical' ? '!' : (sev === 'warning' ? '⚠' : '·');
      html += '<li class="ai-issue-item">';
      html += '<div class="ai-issue-icon ' + escapeHtml(sev) + '">' + iconLetter + '</div>';
      html += '<div class="ai-issue-body">';
      if (orig || sugg) {
        html += '<div class="ai-issue-change">';
        if (orig)          html += '<span class="original">' + escapeHtml(orig) + '</span>';
        if (orig && sugg)  html += '<span class="arrow">→</span>';
        if (sugg)          html += '<span class="suggestion">' + escapeHtml(sugg) + '</span>';
        html += '</div>';
      }
      if (expl) html += '<div class="ai-issue-explanation">' + escapeHtml(expl) + '</div>';
      html += '</div>';
      if (typ) html += '<div class="ai-issue-type">' + escapeHtml(typ) + '</div>';
      html += '</li>';
    }
    html += '</ul>';
  } else {
    html += '<div class="ai-section-title">지적 사항</div>';
    html += '<div class="no-issues" style="padding:16px 0">추가 교정할 부분이 발견되지 않았습니다. 잘 작성된 기사입니다.</div>';
  }

  if (Array.isArray(structNotes) && structNotes.length > 0) {
    html += '<div class="ai-section-title">구조적 관찰</div>';
    html += '<ul class="ai-structural-list">';
    for (var j = 0; j < structNotes.length; j++) {
      html += '<li>' + escapeHtml(structNotes[j]) + '</li>';
    }
    html += '</ul>';
  }

  aiReviewBody.innerHTML = html;
}

async function runAiReview(){
  if (!originalText || !originalText.trim()) {
    alert('먼저 기사를 입력하고 교정하세요.');
    return;
  }
  if (AI_WORKER_URL.indexOf('REPLACE_ME') !== -1) {
    renderAiReviewError('AI Worker URL이 아직 설정되지 않았습니다. 관리자에게 문의하세요.');
    aiReviewSection.classList.remove('hidden');
    aiReviewSection.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return;
  }

  aiReviewBtn.disabled = true;
  aiReviewSection.classList.remove('hidden');
  aiReviewBody.innerHTML = '<div class="ai-review-loading"><span class="ai-review-spinner"></span>분석 중입니다&hellip; 길면 10초 정도 걸릴 수 있습니다.</div>';
  setTimeout(function(){ aiReviewSection.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 30);

  try {
    var resp = await fetch(AI_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: originalText }),
    });
    var data = null;
    try { data = await resp.json(); } catch(_) {}
    if (!resp.ok) {
      var msg = data && data.error && data.error.message
        ? '(' + data.error.code + ') ' + data.error.message
        : 'HTTP ' + resp.status;
      if (resp.status === 429) msg = '호출 한도를 초과했습니다. 잠시 후 다시 시도해주세요.';
      if (resp.status === 403) msg = '이 페이지에서는 AI 검토를 사용할 수 없습니다 (origin 제한).';
      if (resp.status === 500 && data && data.error && data.error.code === 'not_configured')
        msg = 'AI Worker에 API 키가 설정되지 않았습니다. 관리자에게 문의하세요.';
      renderAiReviewError('AI 검토 실패: ' + msg);
      return;
    }
    renderAiReviewResult(data && data.review, data && data.model);
  } catch (e) {
    renderAiReviewError('네트워크 오류: ' + (e && e.message ? e.message : String(e)));
  } finally {
    aiReviewBtn.disabled = false;
  }
}

aiReviewBtn.addEventListener('click', runAiReview);
aiReviewClose.addEventListener('click', function(){
  aiReviewSection.classList.add('hidden');
});

// =============================================================
// Diff Algorithm (word-level LCS)
// =============================================================
function diffWords(oldText, newText){
  var oldTokens = oldText.split(/(\s+)/);
  var newTokens = newText.split(/(\s+)/);
  var m = oldTokens.length;
  var n = newTokens.length;

  var dp = [];
  for(var i = 0; i <= m; i++){
    dp[i] = new Uint16Array(n + 1);
  }
  for(var i = 1; i <= m; i++){
    for(var j = 1; j <= n; j++){
      if(oldTokens[i-1] === newTokens[j-1]){
        dp[i][j] = dp[i-1][j-1] + 1;
      } else {
        dp[i][j] = dp[i-1][j] > dp[i][j-1] ? dp[i-1][j] : dp[i][j-1];
      }
    }
  }

  var result = [];
  var i = m, j = n;
  while(i > 0 || j > 0){
    if(i > 0 && j > 0 && oldTokens[i-1] === newTokens[j-1]){
      result.push({type:'equal', value: oldTokens[i-1]});
      i--; j--;
    } else if(j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])){
      result.push({type:'insert', value: newTokens[j-1]});
      j--;
    } else {
      result.push({type:'delete', value: oldTokens[i-1]});
      i--;
    }
  }
  result.reverse();
  return result;
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderDiff(diff, side){
  var html = '';
  for(var k = 0; k < diff.length; k++){
    var d = diff[k];
    var val = escapeHtml(d.value).replace(/\n\n+/g, '</p><p style="margin-top:12px">').replace(/\n/g, '<br>');
    if(d.type === 'equal'){
      html += val;
    } else if(d.type === 'delete'){
      if(side === 'left') html += '<span class="diff-del">' + val + '</span>';
    } else if(d.type === 'insert'){
      if(side === 'right') html += '<span class="diff-ins">' + val + '</span>';
    }
  }
  return html;
}

// =============================================================
// Proofread (rule-based, synchronous)
// =============================================================
function proofread(text) {
  var result = analyzeArticle(text);

  // Auto-replace: filter to replaceable corrections, sort by startIndex descending
  var sorted = result.corrections
    .filter(function(c){ return !c.noAutoReplace && c.suggested; })
    .sort(function(a, b){ return b.startIndex - a.startIndex; });

  var revised = text;
  for (var i = 0; i < sorted.length; i++) {
    var c = sorted[i];
    revised = revised.slice(0, c.startIndex) + c.suggested + revised.slice(c.endIndex);
  }

  return { revised: revised, result: result };
}

// Render corrections list
// =============================================================
var categoryLabels = {
  spelling: '맞춤법',
  expression: '표현',
  structure: '구조',
  ethics: '윤리'
};
var categoryIcons = {
  spelling: 'Aa',
  expression: '文',
  structure: '段',
  ethics: '倫'
};
var severityIcons = {
  error: '!',
  warning: '?',
  info: 'i'
};

function renderCorrections(corrections) {
  if (corrections.length === 0) {
    correctionsList.innerHTML = '<li class="no-issues">교정 사항이 없습니다. 잘 작성된 기사입니다!</li>';
    return;
  }

  var html = '';
  for (var i = 0; i < corrections.length; i++) {
    var c = corrections[i];
    var iconClass = c.severity;
    var manualTag = c.noAutoReplace ? '<span class="tag-manual">직접 확인 필요</span>' : '';

    html += '<li class="correction-item">';
    html += '<div class="correction-icon ' + iconClass + '">' + severityIcons[c.severity] + '</div>';
    html += '<div class="correction-body">';
    html += '<div class="correction-change">';
    html += '<span class="original">' + escapeHtml(c.original.length > 60 ? c.original.substring(0, 60) + '...' : c.original) + '</span>';
    html += '<span class="arrow">&rarr;</span>';
    html += '<span class="suggested">' + escapeHtml(c.suggested.length > 60 ? c.suggested.substring(0, 60) + '...' : c.suggested) + '</span>';
    html += manualTag;
    html += '</div>';
    html += '<div class="correction-reason">' + escapeHtml(c.reason) + '</div>';
    html += '</div>';
    html += '<div class="correction-category">' + (categoryLabels[c.category] || c.category) + '</div>';
    html += '</li>';
  }
  correctionsList.innerHTML = html;
}

function renderStats(stats) {
  var scoreColor = stats.score >= 80 ? 'var(--success)' : stats.score >= 50 ? 'var(--warning-color)' : 'var(--danger)';
  var html = '<span class="stat-score" style="color:' + scoreColor + '">' + stats.score + '점</span>';

  if (stats.byCategory.spelling > 0) {
    html += '<span class="stat-badge error">맞춤법 ' + stats.byCategory.spelling + '</span>';
  }
  if (stats.byCategory.expression > 0) {
    html += '<span class="stat-badge warning">표현 ' + stats.byCategory.expression + '</span>';
  }
  if (stats.byCategory.structure > 0) {
    html += '<span class="stat-badge info">구조 ' + stats.byCategory.structure + '</span>';
  }
  if (stats.byCategory.ethics > 0) {
    html += '<span class="stat-badge error">윤리 ' + stats.byCategory.ethics + '</span>';
  }

  toolbarStats.innerHTML = html;
  correctionsTitle.textContent = '교정 사항 (' + stats.totalIssues + '건)';
}

// =============================================================
// Archive
// =============================================================
var ARCHIVE_KEY = 'news_proofreader_archive';
var ARCHIVE_MAX = 50;

function getArchive() {
  try {
    var data = localStorage.getItem(ARCHIVE_KEY);
    return data ? JSON.parse(data) : [];
  } catch(e) { return []; }
}

function setArchive(arr) {
  localStorage.setItem(ARCHIVE_KEY, JSON.stringify(arr));
}

function saveArchive(original, revised, corrections, score) {
  var archive = getArchive();
  archive.unshift({
    id: Date.now(),
    date: new Date().toLocaleString('ko-KR'),
    original: original,
    revised: revised,
    corrections: corrections,
    score: score,
    preview: original.substring(0, 50) + (original.length > 50 ? '...' : '')
  });
  if (archive.length > ARCHIVE_MAX) {
    archive = archive.slice(0, ARCHIVE_MAX);
  }
  setArchive(archive);
}

function renderArchiveList() {
  var archive = getArchive();

  if (archive.length === 0) {
    archiveBody.innerHTML = '<div class="archive-empty"><div class="archive-empty-icon">&#128203;</div><div>아직 교정 이력이 없습니다</div></div>';
    archiveFooter.style.display = 'none';
    return;
  }
  archiveFooter.style.display = '';

  // Show/hide admin-only buttons
  if (isAdminLoggedIn) {
    archiveClearBtn.style.display = '';
    changePwBtn.style.display = '';
  } else {
    archiveClearBtn.style.display = 'none';
    changePwBtn.style.display = 'none';
  }

  var html = '';
  for (var i = 0; i < archive.length; i++) {
    var item = archive[i];
    var scoreColor = item.score >= 80 ? 'var(--success)' : item.score >= 50 ? 'var(--warning-color)' : 'var(--danger)';
    var previewText = item.original.substring(0, 80) + (item.original.length > 80 ? '...' : '');
    html += '<div class="archive-card" data-archive-id="' + item.id + '">';
    if (isAdminLoggedIn) {
      html += '<button class="archive-card-delete" data-delete-id="' + item.id + '" title="삭제">&times;</button>';
    }
    html += '<div class="archive-card-top">';
    html += '<span class="archive-card-date">' + escapeHtml(item.date) + '</span>';
    html += '<div class="archive-card-stats">';
    html += '<span class="archive-card-corrections">교정 ' + item.corrections + '건</span>';
    html += '<span class="archive-card-score" style="color:' + scoreColor + '">' + item.score + '점</span>';
    html += '</div></div>';
    html += '<div class="archive-card-preview">' + escapeHtml(previewText) + '</div>';
    html += '</div>';
  }
  archiveBody.innerHTML = html;
}

function openArchiveItem(id) {
  var archive = getArchive();
  var item = null;
  for (var i = 0; i < archive.length; i++) {
    if (archive[i].id === id) { item = archive[i]; break; }
  }
  if (!item) return;

  isArchiveReadOnly = true;

  // Compute diff
  var diff = diffWords(item.original, item.revised);

  // Render panels
  originalPanel.innerHTML = '<p>' + renderDiff(diff, 'left') + '</p>';
  revisedPanel.innerHTML  = '<p>' + renderDiff(diff, 'right') + '</p>';
  revisedPanel.contentEditable = 'false';

  // Update header to read-only
  var panelHeaders = document.querySelectorAll('.panel-header');
  if (panelHeaders.length >= 2) {
    panelHeaders[1].textContent = '수정본 (읽기 전용)';
  }

  // Update revised char count
  var revisedCharCount = document.getElementById('revisedCharCount');
  revisedCharCount.textContent = revisedPanel.innerText.length + '자';

  // Re-analyze for stats and corrections
  var result = analyzeArticle(item.original);
  renderStats(result.stats);
  renderCorrections(result.corrections);

  // Reset collapse state
  correctionsCollapsed = false;
  correctionsList.style.display = '';
  correctionsToggle.textContent = '접기';

  // Change back button to go to archive
  backBtn.textContent = '\u2190 아카이브로 돌아가기';

  copyBtn.style.display = '';

  showScreen(compareScreen);
}

function deleteArchiveItem(id) {
  var archive = getArchive();
  archive = archive.filter(function(item) { return item.id !== id; });
  setArchive(archive);
  renderArchiveList();
}

function clearArchive() {
  if (confirm('모든 교정 이력을 삭제하시겠습니까?')) {
    localStorage.removeItem(ARCHIVE_KEY);
    renderArchiveList();
  }
}

// Archive nav button
archiveNavBtn.addEventListener('click', function() {
  // Already logged in as admin this session
  if (isAdminLoggedIn) {
    renderArchiveList();
    showScreen(archiveScreen);
    return;
  }
  // No password set yet — show setup modal
  var storedHash = localStorage.getItem('admin_pw_hash');
  if (!storedHash) {
    showSetupPasswordModal();
    return;
  }
  // Password exists — show access modal (admin/reporter tabs)
  showAccessModal();
});

// Archive card click delegation
archiveBody.addEventListener('click', function(e) {
  // Check for code copy button
  // Check for delete button
  var deleteBtn = e.target.closest('.archive-card-delete');
  if (deleteBtn) {
    e.stopPropagation();
    var deleteId = parseInt(deleteBtn.getAttribute('data-delete-id'), 10);
    deleteArchiveItem(deleteId);
    return;
  }
  // Check for card click
  var card = e.target.closest('.archive-card');
  if (card) {
    var archiveId = parseInt(card.getAttribute('data-archive-id'), 10);
    openArchiveItem(archiveId);
  }
});

// Override back button behavior to handle archive read-only mode
backBtn.addEventListener('click', function(){
  if (isArchiveReadOnly) {
    isArchiveReadOnly = false;
    revisedPanel.contentEditable = 'true';
    copyBtn.style.display = '';
    var panelHeaders = document.querySelectorAll('.panel-header');
    if (panelHeaders.length >= 2) {
      panelHeaders[1].textContent = '수정본 (편집 가능)';
    }
    backBtn.textContent = '\u2190 다시 교정하기';
    renderArchiveList();
    showScreen(archiveScreen);
    return;
  }
  showScreen(inputScreen);
  articleInput.value = originalText;
  charCount.textContent = originalText.length + '자';
});

// New article button — reset to blank initial screen
newArticleBtn.addEventListener('click', function(){
  originalText = '';
  articleInput.value = '';
  charCount.textContent = '0자';
  originalPanel.innerHTML = '';
  revisedPanel.innerHTML = '';
  toolbarStats.innerHTML = '';
  correctionsList.innerHTML = '';
  aiReviewSection.classList.add('hidden');
  aiReviewBody.innerHTML = '';
  showScreen(inputScreen);
  articleInput.focus();
});

// Archive back button — reset modes
archiveBackBtn.addEventListener('click', function() {
  showScreen(inputScreen);
});

// Password change button
changePwBtn.addEventListener('click', function() {
  showChangePasswordModal();
});

// Archive clear button
archiveClearBtn.addEventListener('click', clearArchive);

// Migrate legacy archive items on load
migrateArchiveAccessCodes();

})();
</script>
</body>
</html>
